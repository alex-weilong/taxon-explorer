const geoCache = {};
function obtenerGeometria(placeId) {
  if (geoCache[placeId]) return geoCache[placeId];
  geoCache[placeId] = fetch(`${API}/places/${placeId}`)
    .then(r => r.ok ? r.json() : null)
    .then(data => data?.results?.[0]?.geometry_geojson || null)
    .catch(() => null);
  return geoCache[placeId];
}

async function showPreview(place) {
  const previewEl = document.getElementById('placePreviewInner');
  const mapEl     = document.getElementById('placePreviewMap');
  const labelEl   = document.getElementById('placePreviewLabelInner');
  if (!previewEl || !mapEl) return;
  previewEl.classList.add('visible');
  if (labelEl) labelEl.textContent = place.display_name || place.name;
  if (!previewMap) {
    previewMap = L.map('placePreviewMap', {
      zoomControl: false, attributionControl: false,
      dragging: false, scrollWheelZoom: false,
      doubleClickZoom: false, touchZoom: false,
      center: [20, 0], zoom: 2,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }).addTo(previewMap);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19, opacity: 0.8 }).addTo(previewMap);
    setTimeout(() => previewMap.invalidateSize(), 50);
  } else {
    previewMap.invalidateSize();
  }
  previewMap.eachLayer(l => { if (l instanceof L.GeoJSON || l instanceof L.CircleMarker) previewMap.removeLayer(l); });
  const geojson = await obtenerGeometria(place.id);
  if (geojson) {
    try {
      const geo = typeof geojson === 'string' ? JSON.parse(geojson) : geojson;
      const layer = L.geoJSON(geo, { style: { color: '#58a6ff', weight: 2, fillColor: '#58a6ff', fillOpacity: 0.18 } }).addTo(previewMap);
      previewMap.fitBounds(layer.getBounds(), { padding: [16, 16] });
    } catch(e) { mostrarPuntoFallback(place); }
  } else { mostrarPuntoFallback(place); }
}

function mostrarPuntoFallback(place) {
  if (!previewMap || !place.location) return;
  const [lat, lng] = place.location.split(',').map(Number);
  if (isNaN(lat) || isNaN(lng)) return;
  previewMap.setView([lat, lng], 5);
  L.circleMarker([lat, lng], { radius: 8, color: '#58a6ff', fillColor: '#58a6ff', fillOpacity: 0.8, weight: 2 }).addTo(previewMap);
}

function selectPlace(place) {
  activePlaceId = place.id;
  activePlaceName = place.display_name || place.name;
  clearCache();
  Object.keys(phenologyCache).forEach(k => delete phenologyCache[k]);
  placeInput.value = ''; placeClear.classList.remove('visible');
  closePlaceDropdown();
  activePlaceNameEl.textContent = activePlaceName;
  activePlaceEl.classList.add('visible');
  // Re-render current level instead of going home
  repaint();
}

function clearPlaceFilter() {
  activePlaceId = null; activePlaceName = '';
  clearCache();
  Object.keys(phenologyCache).forEach(k => delete phenologyCache[k]);
  activePlaceEl.classList.remove('visible');
  // Re-render current level instead of going home
  repaint();
}

// ─── iNATURALIST SYNC ─────────────────────────────────────────
let currentUser = null;
let seenCache   = {};

function saveLocal() {
  try {
    localStorage.setItem('bioexp_user', JSON.stringify(currentUser));
    localStorage.setItem('bioexp_seen', JSON.stringify(seenCache));
  } catch(e) {}
}
function loadLocal() {
  try {
    const u = localStorage.getItem('bioexp_user');
    const s = localStorage.getItem('bioexp_seen');
    if (u) currentUser = JSON.parse(u);
    if (s) seenCache   = JSON.parse(s);
  } catch(e) {}
}

function isSeen(id) { return !!seenCache[id]; }

function updateSeenCounter() {
  const el = document.getElementById('mySpeciesCount');
  if (el) el.textContent = Object.keys(seenCache).length;
}

function updateAuthUI() {
  const btn    = document.getElementById('authBtn');
  const avatar = document.getElementById('authAvatar');
  if (!btn) return;
  btn.querySelector('.auth-google-icon').textContent = '🌿';
  if (currentUser) {
    btn.title = 'Cerrar sesión / Resincronizar';
    if (avatar && currentUser.icon) {
      avatar.style.backgroundImage = `url(${currentUser.icon})`;
      avatar.style.display = 'block';
    }
    btn.querySelector('.auth-label').textContent = '@' + currentUser.login;
  } else {
    if (avatar) avatar.style.display = 'none';
    btn.querySelector('.auth-label').textContent = 'Conectar iNat';
  }
}

async function handleAuth() {
  if (currentUser) {
    const action = confirm(`@${currentUser.login}\n\nPulsa OK para resincronizar observaciones, o Cancelar y luego usa "Cerrar sesión" en Mis especies.`);
    if (action) await resync();
  } else {
    showInatLoginPrompt();
  }
}

async function resync() {
  const toast = showToast('Sincronizando…', 'muted');
  try {
    await syncInatUser(currentUser.login, null);
    saveLocal(); updateSeenCounter(); refreshSeenBadges();
    toast.update(`✓ ${Object.keys(seenCache).length} especies sincronizadas`, 'accent');
  } catch(e) {
    toast.update(`✗ ${e.message}`, 'accent3');
  }
  setTimeout(() => toast.remove(), 3000);
}

function showToast(msg, color = 'muted') {
  const d = document.createElement('div');
  d.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 20px;z-index:3000;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--${color});white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:color 0.2s`;
  d.textContent = msg;
  document.body.appendChild(d);
  return {
    update(m, c) { d.textContent = m; d.style.color = `var(--${c})`; },
    remove() { d.remove(); }
  };
}

function showInatLoginPrompt() {
  const m = document.createElement('div');
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px';
  m.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:360px;width:100%;text-align:center">
      <div style="font-size:2.5rem;margin-bottom:12px">🌿</div>
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.3rem;margin-bottom:8px">Conectar con iNaturalist</div>
      <div style="color:var(--muted);font-size:0.8rem;margin-bottom:20px;font-family:'DM Mono',monospace;line-height:1.5">
        Introduce tu usuario de iNaturalist para sincronizar tus observaciones verificadas y ver qué especies has visto
      </div>
      <input id="inatLoginInput" type="text" placeholder="tu_usuario_inat"
        autocomplete="off" spellcheck="false" dir="ltr"
        style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none;margin-bottom:12px;text-align:center;direction:ltr">
      <button id="inatLoginBtn"
        style="width:100%;padding:12px;background:var(--accent);color:#0d1117;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;font-family:'DM Mono',monospace;font-weight:600;margin-bottom:8px">
        Sincronizar
      </button>
      <div id="inatLoginStatus" style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);min-height:18px;line-height:1.5"></div>
      <button id="inatLoginClose" style="margin-top:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.82rem">Cancelar</button>
    </div>
  `;

  const input  = m.querySelector('#inatLoginInput');
  const btn    = m.querySelector('#inatLoginBtn');
  const status = m.querySelector('#inatLoginStatus');

  const doSync = async () => {
    const login = input.value.trim();
    if (!login) return;
    btn.disabled = true; btn.textContent = '…';
    status.style.color = 'var(--muted)';
    status.textContent = 'Verificando usuario…';
    try {
      await syncInatUser(login, status);
      saveLocal(); updateAuthUI(); updateSeenCounter(); refreshSeenBadges();
      status.style.color = 'var(--accent)';
      setTimeout(() => document.body.removeChild(m), 1000);
    } catch(e) {
      status.style.color = 'var(--accent3)';
      status.textContent = `✗ ${e.message}`;
      btn.disabled = false; btn.textContent = 'Sincronizar';
    }
  };

  btn.addEventListener('click', doSync);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSync(); });
  m.querySelector('#inatLoginClose').addEventListener('click', () => document.body.removeChild(m));
  document.body.appendChild(m);
  setTimeout(() => input.focus(), 50);
}

async function syncInatUser(login, statusEl) {
  const userRes = await fetch(`${API}/users/autocomplete?q=${encodeURIComponent(login)}&per_page=5`);
  if (!userRes.ok) throw new Error('Error al contactar iNaturalist');
  const userData = await userRes.json();
  const user = (userData.results || []).find(u => u.login.toLowerCase() === login.toLowerCase());
  if (!user) throw new Error(`Usuario "${login}" no encontrado`);

  if (statusEl) statusEl.textContent = `✓ @${user.login} encontrado. Descargando observaciones…`;
  currentUser = { login: user.login, name: user.name || user.login, icon: user.icon || null };

  const PER_PAGE = 200;
  const newSeen = {};
  let page = 1;
  let total = null;

  while (true) {
    const url = `${API}/observations/species_counts?user_login=${encodeURIComponent(user.login)}&per_page=${PER_PAGE}&page=${page}&locale=es`;
    const res = await fetch(url);
    if (!res.ok) break;
    const data = await res.json();

    if (total === null) total = data.total_results || 0;

    const results = data.results || [];
    if (!results.length) break;

    results.forEach(r => {
      const t = r.taxon;
      newSeen[t.id] = {
        id: t.id, name: t.name,
        common: t.preferred_common_name || '',
        photo: t.default_photo?.medium_url || t.default_photo?.url || null,
        inatUrl: `https://www.inaturalist.org/taxa/${t.id}`,
        ancestor_ids: t.ancestor_ids || [],
        count: r.count,
      };
    });

    const loaded = Object.keys(newSeen).length;
    if (statusEl) statusEl.textContent = `Cargando… ${loaded}${total ? ' / ' + total : ''} especies (pág. ${page})`;

    if (total !== null && loaded >= total) break;
    if (results.length < PER_PAGE) break;

    page++;
    await new Promise(r => setTimeout(r, 100));
  }

  seenCache = newSeen;
  if (statusEl) statusEl.textContent = `✓ ${Object.keys(seenCache).length} especies sincronizadas`;
}

function refreshSeenBadges() {
  document.querySelectorAll('.sp-card[data-sp-id]').forEach(card => {
    const id = parseInt(card.dataset.spId);
    const wrap = card.querySelector('.sp-img-wrap');
    if (!wrap) return;
    const existing = wrap.querySelector('.seen-badge');
    const seen = isSeen(id);
    card.classList.toggle('seen-card', seen);
    if (seen && !existing) {
      const badge = document.createElement('div');
      badge.className = 'seen-badge'; badge.textContent = '✓';
      wrap.insertBefore(badge, wrap.querySelector('.map-btn'));
    } else if (!seen && existing) {
      existing.remove();
    }
  });
}

// ─── MY SPECIES PAGE ──────────────────────────────────────────
const TAXON_GROUPS = [
  { id: 26036,  name: 'Reptiles',    icon: '🦎' },
  { id: 3,      name: 'Aves',        icon: '🦅' },
  { id: 40151,  name: 'Mamíferos',   icon: '🦁' },
  { id: 20978,  name: 'Anfibios',    icon: '🐸' },
  { id: 47119,  name: 'Arácnidos',   icon: '🕷️' },
  { id: 47158,  name: 'Insectos',    icon: '🦋' },
  { id: 47178,  name: 'Peces',       icon: '🐠' },
  { id: 47126,  name: 'Plantas',     icon: '🌿' },
  { id: 47170,  name: 'Hongos',      icon: '🍄' },
  { id: 48222,  name: 'Moluscos',    icon: '🐚' },
  { id: 47549,  name: 'Crustáceos',  icon: '🦞' },
  { id: 144128, name: 'Miriápodos',  icon: '🐛' },
];

function getGroupForSpecies(sp) {
  const ancestors = sp.ancestor_ids || [];
  for (const g of TAXON_GROUPS) { if (ancestors.includes(g.id)) return g; }
  return { id: 0, name: 'Otros', icon: '🔬' };
}

function showMySpecies() {
  if (!currentUser) { showInatLoginPrompt(); return; }
  pushNav('Mis especies', () => renderMySpecies());
}

function renderMySpecies() {
  const species = Object.values(seenCache).sort((a, b) => a.name.localeCompare(b.name));
  const m = document.getElementById('main');

  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Sincronizado desde iNaturalist</div>
        <div class="level-title">👁 @${currentUser?.login}</div>
      </div>
      <div class="level-sub">${species.length} especies observadas</div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;flex:1">
        Observaciones verificadas (research grade) de @${currentUser?.login}
      </span>
      <button id="resyncBtn" style="padding:6px 14px;background:none;border:1px solid var(--accent);color:var(--accent);border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.73rem;white-space:nowrap">↺ Actualizar</button>
      <button id="logoutBtn" style="padding:6px 14px;background:none;border:1px solid var(--dim);color:var(--dim);border-radius:6px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.73rem;white-space:nowrap">Cerrar sesión</button>
    </div>

    ${species.length === 0
      ? `<div style="text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.85rem">
           <div style="font-size:3rem;margin-bottom:12px">🔭</div>
           No se encontraron observaciones verificadas para @${currentUser?.login}
         </div>`
      : `<div id="myGroupsContainer"></div>`
    }
  `;

  document.getElementById('resyncBtn')?.addEventListener('click', async () => {
    const btn = document.getElementById('resyncBtn');
    btn.textContent = '…'; btn.disabled = true;
    try {
      await syncInatUser(currentUser.login, null);
      saveLocal(); updateSeenCounter(); renderMySpecies();
    } catch(e) {
      btn.textContent = '✗'; setTimeout(() => { btn.textContent = '↺ Actualizar'; btn.disabled = false; }, 2000);
    }
  });

  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    if (confirm(`¿Cerrar sesión de @${currentUser.login}?`)) {
      currentUser = null; seenCache = {};
      saveLocal(); updateAuthUI(); updateSeenCounter();
      navStack.length = 0; history.replaceState({ depth: 0 }, '', ''); repaint();
    }
  });

  if (!species.length) return;

  const groups = {};
  species.forEach(sp => {
    const g = getGroupForSpecies(sp);
    if (!groups[g.name]) groups[g.name] = { ...g, species: [] };
    groups[g.name].species.push(sp);
  });

  const orderedGroups = [
    ...TAXON_GROUPS.map(g => groups[g.name]).filter(Boolean),
    ...(groups['Otros'] ? [groups['Otros']] : []),
  ];

  const container = document.getElementById('myGroupsContainer');
  orderedGroups.forEach(group => {
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:10px;margin:28px 0 14px';
    header.innerHTML = `
      <span style="font-size:1.6rem">${group.icon}</span>
      <span style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;font-weight:700">${group.name}</span>
      <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:99px">${group.species.length}</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    `;
    container.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'species-grid';
    group.species.forEach(sp => {
      const card = document.createElement('div');
      card.className = 'sp-card seen-card';
      card.dataset.spId = sp.id;
      const img = sp.photo
        ? `<img class="sp-img" src="${sp.photo}" alt="${sp.name}" loading="lazy">`
        : `<div class="sp-no-img"><span>📷</span><small>sin foto</small></div>`;
      card.innerHTML = `
        <div class="sp-img-wrap">
          ${img}
          <div class="seen-badge">✓</div>
          <button class="map-btn" title="Ver distribución">🗺️</button>
          <button class="phenology-btn" title="Ver fenología">📅</button>
        </div>
        <div class="sp-info">
          <div class="sp-sci">${sp.name}</div>
          ${sp.common ? `<div class="sp-common">${sp.common}</div>` : ''}
          <div class="sp-obs" style="color:var(--accent2)">${sp.count ? sp.count + ' obs.' : ''}</div>
        </div>
      `;
      card.querySelector('.map-btn').addEventListener('click', e => {
        e.stopPropagation(); openMapPopover(sp, e.currentTarget);
      });
      card.querySelector('.phenology-btn').addEventListener('click', e => {
        e.stopPropagation(); openPhenologyPopover(sp, e.currentTarget);
      });
      card.addEventListener('click', () => openModal(sp));
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}
