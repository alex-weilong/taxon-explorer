<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioExplorer</title>
<meta name="description" content="Explorador taxonómico de biodiversidad">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BioExplorer">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #7ee787;
  --accent2: #58a6ff;
  --accent3: #f78166;
  --text: #e6edf3;
  --muted: #8b949e;
  --dim: #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(126,231,135,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(126,231,135,0.025) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 40px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 20px; height: 62px;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.logo em { color: var(--accent); font-style: italic; }
.breadcrumb {
  display: flex; align-items: center; gap: 4px;
  font-family: 'DM Mono', monospace; font-size: 0.78rem;
  flex: 1; min-width: 0; overflow: hidden;
}
.crumb { color: var(--muted); cursor: pointer; padding: 3px 7px; border-radius: 4px; white-space: nowrap; transition: all 0.15s; }
.crumb:hover { color: var(--text); background: var(--surface2); }
.crumb.current { color: var(--text); cursor: default; overflow: hidden; text-overflow: ellipsis; }
.crumb.current:hover { background: none; }
.crumb-sep { color: var(--dim); flex-shrink: 0; }
.src-badge {
  flex-shrink: 0; margin-left: auto;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px; font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  border: 1px solid rgba(126,231,135,0.35);
  color: var(--accent); background: rgba(126,231,135,0.04);
}

/* MAIN */
main { max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px; position: relative; z-index: 1; }

/* LEVEL HEADER */
.level-header { margin-bottom: 32px; display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.level-rank {
  font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--dim); border: 1px solid var(--dim);
  padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px;
}
.level-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.7rem); font-weight: 700; line-height: 1; font-style: italic; }
.level-sub { color: var(--muted); font-size: 0.83rem; margin-left: auto; font-family: 'DM Mono', monospace; white-space: nowrap; }

/* CARD GRID */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

.taxon-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}
.taxon-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }

/* Photo area */
.tc-img-wrap {
  width: 100%; aspect-ratio: 3/2; overflow: hidden;
  background: var(--surface2); flex-shrink: 0; position: relative;
}
.tc-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
.taxon-card:hover .tc-img { transform: scale(1.06); }
.tc-no-img {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 2rem;
}

/* Text area */
.tc-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.tc-arrow { position: absolute; top: 10px; right: 10px; color: white; font-size: 0.9rem; background: rgba(0,0,0,0.45); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px); z-index: 1; }
.taxon-card:hover .tc-arrow { background: var(--accent); color: #0d1117; transform: translateX(2px); }
.tc-rank { font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
.tc-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.05rem; line-height: 1.2; color: var(--text); }
.tc-common { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tc-pill { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 99px; }

/* SPECIES GRID */
.species-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
.sp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.22s; }
.sp-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.sp-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: var(--surface2); }
.sp-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.sp-card:hover .sp-img { transform: scale(1.06); }
.sp-no-img { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--dim); font-size: 1.8rem; }
.sp-no-img small { font-size: 0.62rem; font-family: 'DM Mono', monospace; }
.sp-info { padding: 10px 12px; }
.sp-sci { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.84rem; color: var(--accent); line-height: 1.3; }
.sp-common { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-obs { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--dim); margin-top: 6px; }

/* GROUP HOME */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; animation: fadeUp 0.3s ease both; }
.group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 22px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 10px; }
.group-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 32px rgba(0,0,0,0.4); }
.group-icon { font-size: 2.2rem; }
.group-name { font-size: 1rem; font-weight: 500; }
.group-hint { font-size: 0.7rem; color: var(--dim); font-family: 'DM Mono', monospace; }

/* LOADING */
.loading { text-align: center; padding: 100px 20px; }
.spinner { width: 42px; height: 42px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.82rem; }
.loading-sub { color: var(--dim); font-size: 0.7rem; margin-top: 8px; }

/* FILTER BAR */
.filter-bar {
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px; position: sticky; top: 62px; z-index: 99;
}
.filter-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 48px;
}
.filter-label {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dim); white-space: nowrap; flex-shrink: 0;
}
.place-wrap { position: relative; flex: 1; max-width: 320px; }
.place-input {
  width: 100%; padding: 6px 28px 6px 30px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
}
.place-input:focus { border-color: var(--accent2); }
.place-input::placeholder { color: var(--dim); }
.place-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; pointer-events: none; }
.place-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--dim); cursor: pointer;
  font-size: 0.9rem; display: none; padding: 2px; line-height: 1;
  transition: color 0.15s;
}
.place-clear.visible { display: block; }
.place-clear:hover { color: var(--text); }

.place-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.place-dropdown.open { display: block; }
.place-result {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; cursor: pointer;
  transition: background 0.12s; border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.place-result:last-child { border-bottom: none; }
.place-result:hover, .place-result.focused { background: var(--surface2); }
.pr-icon { font-size: 1rem; flex-shrink: 0; }
.pr-name { flex: 1; color: var(--text); }
.pr-type { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }
.place-msg { padding: 10px 12px; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.72rem; text-align: center; }

/* Place preview map panel */
.place-preview {
  border-top: 1px solid var(--border);
  height: 180px; position: relative;
  background: var(--surface2); display: none;
}
.place-preview.visible { display: block; }
.place-preview-label {
  position: absolute; bottom: 8px; left: 8px; z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: white; background: rgba(0,0,0,0.55);
  padding: 3px 8px; border-radius: 4px;
  backdrop-filter: blur(4px); max-width: 80%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}
#placePreviewMap { width: 100%; height: 100%; }

.active-place {
  display: none; align-items: center; gap: 8px;
  padding: 4px 10px; border-radius: 99px;
  background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.35);
  font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--accent2);
}
.active-place.visible { display: flex; }
.active-place button {
  background: none; border: none; color: var(--accent2);
  cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1;
  opacity: 0.7; transition: opacity 0.15s;
}
.active-place button:hover { opacity: 1; }

/* MAIN offset when filter bar visible */
.has-filter main { padding-top: 28px; }

@media (max-width: 768px) {
  .filter-bar { padding: 0 16px; top: 54px; }
  .filter-inner { height: 42px; gap: 8px; }
  .filter-label { display: none; }
  .place-wrap { max-width: 100%; }
}

/* SEARCH */
.search-wrap {
  position: relative; flex: 1; max-width: 340px;
}
.search-input {
  width: 100%; padding: 8px 14px 8px 36px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--dim); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  font-size: 0.9rem; pointer-events: none;
}
.search-clear {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  background: none; border: none; cursor: pointer;
  font-size: 1rem; display: none; padding: 2px 4px;
  line-height: 1; border-radius: 4px;
  transition: color 0.15s;
}
.search-clear:hover { color: var(--text); }
.search-clear.visible { display: block; }

.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.search-dropdown.open { display: block; }

.search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  transition: background 0.15s; border-bottom: 1px solid var(--border);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover, .search-result.focused { background: var(--surface2); }

.sr-photo {
  width: 40px; height: 40px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface2);
}
.sr-no-photo {
  width: 40px; height: 40px; border-radius: 6px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.sr-info { flex: 1; min-width: 0; }
.sr-name {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.88rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-common {
  font-size: 0.72rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-rank {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.08em; flex-shrink: 0;
}
.search-msg {
  padding: 12px 14px; color: var(--dim);
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  text-align: center;
}

/* ERROR */
.error-box { text-align: center; padding: 80px 20px; }
.error-box h3 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent3); font-size: 1.4rem; margin-bottom: 8px; }
.error-box p { color: var(--muted); font-size: 0.82rem; font-family: 'DM Mono', monospace; max-width: 480px; margin: 0 auto; }
.retry-btn { margin-top: 20px; padding: 8px 20px; border: 1px solid var(--accent); color: var(--accent); background: none; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.8rem; transition: all 0.2s; }
.retry-btn:hover { background: rgba(126,231,135,0.08); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.82); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; transform: scale(0.96); transition: transform 0.2s; position: relative; }
.modal-overlay.open .modal { transform: scale(1); }
.modal-handle { display: none; width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-photo { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 16px 16px 0 0; display: block; }
.modal-no-photo { width: 100%; aspect-ratio: 16/9; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 4rem; border-radius: 16px 16px 0 0; }

/* GALLERY */
.gallery-wrap { position: relative; background: #000; border-radius: 16px 16px 0 0; overflow: hidden; }
.gallery-main { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; cursor: zoom-in; transition: opacity 0.2s; }
.gallery-main.loading { opacity: 0.4; }
.gallery-counter {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  background: rgba(0,0,0,0.6); color: #fff; border-radius: 99px;
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  padding: 3px 10px; backdrop-filter: blur(4px);
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; backdrop-filter: blur(4px);
  transition: all 0.2s; z-index: 2;
}
.gallery-nav:hover { background: rgba(126,231,135,0.3); border-color: var(--accent); }
.gallery-nav.prev { left: 10px; }
.gallery-nav.next { right: 10px; }
.gallery-nav:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
.gallery-thumbs {
  display: flex; gap: 6px; padding: 8px 12px;
  background: rgba(0,0,0,0.7); overflow-x: auto;
  position: absolute; bottom: 0; left: 0; right: 0;
  scrollbar-width: none;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }
.gallery-thumb {
  width: 52px; height: 40px; object-fit: cover;
  border-radius: 5px; cursor: pointer; flex-shrink: 0;
  border: 2px solid transparent; transition: all 0.15s; opacity: 0.6;
}
.gallery-thumb.active { border-color: var(--accent); opacity: 1; }
.gallery-thumb:hover { opacity: 0.9; }
.gallery-caption {
  position: absolute; bottom: 56px; left: 0; right: 0;
  padding: 4px 12px;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: rgba(255,255,255,0.6); text-align: right;
  pointer-events: none;
}
.gallery-loading-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: var(--surface2);
  border-radius: 16px 16px 0 0;
}
/* AUTH BUTTON */
.auth-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 5px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; flex-shrink: 0;
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  transition: all 0.2s; white-space: nowrap;
}
.auth-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.auth-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background-size: cover; background-position: center;
  border: 1px solid var(--border); display: none; flex-shrink: 0;
}
.auth-google-icon { font-size: 1rem; flex-shrink: 0; }

/* SEEN SPECIES SYSTEM */
.seen-btn {
  position: absolute; bottom: 8px; right: 8px; z-index: 2;
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.7); font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.seen-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,0,0,0.6); }
.seen-btn.seen { background: var(--accent); border-color: var(--accent); color: #0d1117; }
.sp-card.seen-card { border-color: rgba(126,231,135,0.4); }
.sp-card.seen-card .sp-img-wrap::after {
  content: '✓';
  position: absolute; top: 6px; right: 6px;
  background: var(--a
