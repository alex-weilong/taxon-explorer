<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioExplorer</title>
<meta name="description" content="Explorador taxonómico de biodiversidad">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BioExplorer">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #7ee787;
  --accent2: #58a6ff;
  --accent3: #f78166;
  --text: #e6edf3;
  --muted: #8b949e;
  --dim: #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(126,231,135,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(126,231,135,0.025) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 40px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 20px; height: 62px;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.logo em { color: var(--accent); font-style: italic; }
.breadcrumb {
  display: flex; align-items: center; gap: 4px;
  font-family: 'DM Mono', monospace; font-size: 0.78rem;
  flex: 1; min-width: 0; overflow: hidden;
}
.crumb { color: var(--muted); cursor: pointer; padding: 3px 7px; border-radius: 4px; white-space: nowrap; transition: all 0.15s; }
.crumb:hover { color: var(--text); background: var(--surface2); }
.crumb.current { color: var(--text); cursor: default; overflow: hidden; text-overflow: ellipsis; }
.crumb.current:hover { background: none; }
.crumb-sep { color: var(--dim); flex-shrink: 0; }
.src-badge {
  flex-shrink: 0; margin-left: auto;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px; font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  border: 1px solid rgba(126,231,135,0.35);
  color: var(--accent); background: rgba(126,231,135,0.04);
}

/* MAIN */
main { max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px; position: relative; z-index: 1; }

/* LEVEL HEADER */
.level-header { margin-bottom: 32px; display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.level-rank {
  font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--dim); border: 1px solid var(--dim);
  padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px;
}
.level-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.7rem); font-weight: 700; line-height: 1; font-style: italic; }
.level-sub { color: var(--muted); font-size: 0.83rem; margin-left: auto; font-family: 'DM Mono', monospace; white-space: nowrap; }

/* CARD GRID */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

.taxon-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}
.taxon-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }

/* Photo area */
.tc-img-wrap {
  width: 100%; aspect-ratio: 3/2; overflow: hidden;
  background: var(--surface2); flex-shrink: 0; position: relative;
}
.tc-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
.taxon-card:hover .tc-img { transform: scale(1.06); }
.tc-no-img {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 2rem;
}

/* Text area */
.tc-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.tc-arrow { position: absolute; top: 10px; right: 10px; color: white; font-size: 0.9rem; background: rgba(0,0,0,0.45); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px); z-index: 1; }
.taxon-card:hover .tc-arrow { background: var(--accent); color: #0d1117; transform: translateX(2px); }
.tc-rank { font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
.tc-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.05rem; line-height: 1.2; color: var(--text); }
.tc-common { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tc-pill { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 99px; }

/* SPECIES GRID */
.species-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
.sp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.22s; }
.sp-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.sp-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: var(--surface2); }
.sp-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.sp-card:hover .sp-img { transform: scale(1.06); }
.sp-no-img { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--dim); font-size: 1.8rem; }
.sp-no-img small { font-size: 0.62rem; font-family: 'DM Mono', monospace; }
.sp-info { padding: 10px 12px; }
.sp-sci { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.84rem; color: var(--accent); line-height: 1.3; }
.sp-common { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-obs { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--dim); margin-top: 6px; }

/* HOME: KINGDOM GRID */
.kingdom-grid {
  display: flex; gap: 12px;
  animation: fadeUp 0.3s ease both;
  overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none;
}
.kingdom-grid::-webkit-scrollbar { display: none; }

.kingdom-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; cursor: pointer;
  transition: all 0.22s; overflow: hidden; position: relative;
  display: flex; flex-direction: row; align-items: center;
  flex: 1; min-width: 160px; gap: 0;
  text-decoration: none;
}
.kingdom-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.45); }

.kingdom-icon-wrap {
  flex-shrink: 0; width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  transition: background 0.22s;
}
.kingdom-card:hover .kingdom-icon-wrap { background: rgba(126,231,135,0.06); }

.kingdom-img-wrap {
  flex-shrink: 0; width: 72px; height: 72px;
  overflow: hidden; background: var(--surface2);
  border-right: 1px solid var(--border);
}
.kingdom-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.kingdom-card:hover .kingdom-img { transform: scale(1.1); }

.kingdom-body {
  padding: 12px 16px; display: flex; flex-direction: column;
  gap: 3px; flex: 1; min-width: 0;
}
.kingdom-badge {
  font-family: 'DM Mono', monospace; font-size: 0.52rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim);
}
.kingdom-name {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1.05rem; font-weight: 700; line-height: 1.1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kingdom-common { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kingdom-hint { font-size: 0.6rem; color: var(--dim); font-family: 'DM Mono', monospace; margin-top: 2px; }
.kingdom-arrow {
  flex-shrink: 0; margin-right: 12px;
  background: var(--surface2); color: var(--dim);
  border-radius: 50%; width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; transition: all 0.22s;
  border: 1px solid var(--border);
}
.kingdom-card:hover .kingdom-arrow { background: var(--accent); color: #0d1117; border-color: var(--accent); }

/* LOADING */
.loading { text-align: center; padding: 100px 20px; }
.spinner { width: 42px; height: 42px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.82rem; }
.loading-sub { color: var(--dim); font-size: 0.7rem; margin-top: 8px; }

/* FILTER BAR */
.filter-bar {
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px; position: sticky; top: 62px; z-index: 99;
}
.filter-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
  height: 52px;
}
.filter-divider {
  width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px;
}
.filter-label {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dim); white-space: nowrap; flex-shrink: 0;
}
.place-wrap { position: relative; flex: 1; max-width: 320px; }
.place-input {
  width: 100%; padding: 6px 28px 6px 30px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
  direction: ltr;
}
.place-input:focus { border-color: var(--accent2); }
.place-input::placeholder { color: var(--dim); }
.place-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; pointer-events: none; }
.place-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--dim); cursor: pointer;
  font-size: 0.9rem; display: none; padding: 2px; line-height: 1;
  transition: color 0.15s;
}
.place-clear.visible { display: block; }
.place-clear:hover { color: var(--text); }

.place-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.place-dropdown.open { display: block; }
.place-result {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; cursor: pointer;
  transition: background 0.12s; border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.place-result:last-child { border-bottom: none; }
.place-result:hover, .place-result.focused { background: var(--surface2); }
.pr-icon { font-size: 1rem; flex-shrink: 0; }
.pr-name { flex: 1; color: var(--text); }
.pr-type { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }
.place-msg { padding: 10px 12px; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.72rem; text-align: center; }

/* Place preview map panel */
.place-preview {
  border-top: 1px solid var(--border);
  height: 180px; position: relative;
  background: var(--surface2); display: none;
}
.place-preview.visible { display: block; }
.place-preview-label {
  position: absolute; bottom: 8px; left: 8px; z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: white; background: rgba(0,0,0,0.55);
  padding: 3px 8px; border-radius: 4px;
  backdrop-filter: blur(4px); max-width: 80%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}
#placePreviewMap { width: 100%; height: 100%; }

.active-place {
  display: none; align-items: center; gap: 8px;
  padding: 4px 10px; border-radius: 99px;
  background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.35);
  font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--accent2);
}
.active-place.visible { display: flex; }
.active-place button {
  background: none; border: none; color: var(--accent2);
  cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1;
  opacity: 0.7; transition: opacity 0.15s;
}
.active-place button:hover { opacity: 1; }

/* SEARCH */
.search-wrap {
  position: relative; flex: 1; max-width: 320px;
}
.search-input {
  width: 100%; padding: 6px 28px 6px 30px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
  direction: ltr;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--dim); }
.search-icon {
  position: absolute; left: 8px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  font-size: 0.85rem; pointer-events: none;
}
.search-clear {
  position: absolute; right: 6px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  background: none; border: none; cursor: pointer;
  font-size: 0.9rem; display: none; padding: 2px;
  line-height: 1; border-radius: 4px;
  transition: color 0.15s;
}
.search-clear:hover { color: var(--text); }
.search-clear.visible { display: block; }

.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
  min-width: 320px; right: auto;
}
.search-dropdown.open { display: block; }

.search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  transition: background 0.15s; border-bottom: 1px solid var(--border);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover, .search-result.focused { background: var(--surface2); }

.sr-photo {
  width: 40px; height: 40px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface2);
}
.sr-no-photo {
  width: 40px; height: 40px; border-radius: 6px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.sr-info { flex: 1; min-width: 0; }
.sr-name {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.88rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-common {
  font-size: 0.72rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-rank {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.08em; flex-shrink: 0;
}
.search-msg {
  padding: 12px 14px; color: var(--dim);
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  text-align: center;
}

/* MAP POPOVER */
.map-btn {
  position: absolute; bottom: 8px; left: 8px; z-index: 2;
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.85); font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; line-height: 1;
}
.map-btn:hover { border-color: var(--accent2); background: rgba(0,0,0,0.65); }
.map-btn.active { border-color: var(--accent2); background: rgba(88,166,255,0.3); }

.phenology-btn {
  position: absolute; bottom: 8px; left: 46px; z-index: 2;
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.85); font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; line-height: 1;
}
.phenology-btn:hover { border-color: var(--accent); background: rgba(0,0,0,0.65); }
.phenology-btn.active { border-color: var(--accent); background: rgba(126,231,135,0.3); }

/* PHENOLOGY POPOVER */
.phenology-popover {
  position: fixed; z-index: 900;
  width: 320px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  overflow: hidden; pointer-events: none;
  opacity: 0; transform: scale(0.94) translateY(6px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.phenology-popover.visible {
  opacity: 1; transform: scale(1) translateY(0);
  pointer-events: all;
}
.phenology-header {
  padding: 8px 12px 6px;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.82rem; color: var(--text);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.phenology-body { padding: 14px 14px 10px; }
.phenology-chart { display: flex; align-items: flex-end; gap: 3px; height: 70px; }
.phenology-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.phenology-bar {
  width: 100%; border-radius: 3px 3px 0 0;
  background: var(--accent); transition: height 0.4s ease;
  min-height: 2px;
}
.phenology-bar.gbif { background: #e36d1e; }
.phenology-month {
  font-family: 'DM Mono', monospace; font-size: 0.52rem;
  color: var(--dim); text-align: center; line-height: 1;
}
.phenology-footer {
  padding: 6px 14px 10px;
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--dim); display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.phenology-legend { display: flex; align-items: center; gap: 4px; }
.phenology-dot { width: 8px; height: 8px; border-radius: 2px; }
.phenology-loading {
  padding: 28px 14px; text-align: center;
  font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--dim);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}

.map-popover {
  position: fixed; z-index: 900;
  width: 300px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  overflow: hidden; pointer-events: none;
  opacity: 0; transform: scale(0.94) translateY(6px);
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.map-popover.visible {
  opacity: 1; transform: scale(1) translateY(0);
  pointer-events: all;
}
.map-popover-header {
  padding: 8px 12px 6px;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.82rem; color: var(--text);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.map-popover-map { width: 300px; height: 200px; display: block; }
.map-popover-footer {
  padding: 5px 10px;
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--dim); text-align: right;
}
.map-popover-loading {
  width: 300px; height: 200px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.7rem;
  background: var(--surface2);
}

/* ERROR */
.error-box { text-align: center; padding: 80px 20px; }
.error-box h3 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent3); font-size: 1.4rem; margin-bottom: 8px; }
.error-box p { color: var(--muted); font-size: 0.82rem; font-family: 'DM Mono', monospace; max-width: 480px; margin: 0 auto; }
.retry-btn { margin-top: 20px; padding: 8px 20px; border: 1px solid var(--accent); color: var(--accent); background: none; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.8rem; transition: all 0.2s; }
.retry-btn:hover { background: rgba(126,231,135,0.08); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.82); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; transform: scale(0.96); transition: transform 0.2s; position: relative; }
.modal-overlay.open .modal { transform: scale(1); }
.modal-handle { display: none; width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }

/* GALLERY */
.gallery-wrap { position: relative; background: #000; border-radius: 16px 16px 0 0; overflow: hidden; }
.gallery-main { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; cursor: zoom-in; transition: opacity 0.2s; }
.gallery-main.loading { opacity: 0.4; }
.gallery-counter {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  background: rgba(0,0,0,0.6); color: #fff; border-radius: 99px;
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  padding: 3px 10px; backdrop-filter: blur(4px);
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; backdrop-filter: blur(4px);
  transition: all 0.2s; z-index: 2;
}
.gallery-nav:hover { background: rgba(126,231,135,0.3); border-color: var(--accent); }
.gallery-nav.prev { left: 10px; }
.gallery-nav.next { right: 10px; }
.gallery-nav:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
.gallery-thumbs {
  display: flex; gap: 6px; padding: 8px 12px;
  background: rgba(0,0,0,0.7); overflow-x: auto;
  position: absolute; bottom: 0; left: 0; right: 0;
  scrollbar-width: none;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }
.gallery-thumb {
  width: 52px; height: 40px; object-fit: cover;
  border-radius: 5px; cursor: pointer; flex-shrink: 0;
  border: 2px solid transparent; transition: all 0.15s; opacity: 0.6;
}
.gallery-thumb.active { border-color: var(--accent); opacity: 1; }
.gallery-thumb:hover { opacity: 0.9; }
.gallery-caption {
  position: absolute; bottom: 56px; left: 0; right: 0;
  padding: 4px 12px;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: rgba(255,255,255,0.6); text-align: right;
  pointer-events: none;
}
.gallery-loading-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: var(--surface2);
  border-radius: 16px 16px 0 0;
}

/* AUTH BUTTON */
.auth-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 5px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; flex-shrink: 0;
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  transition: all 0.2s; white-space: nowrap;
}
.auth-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.auth-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background-size: cover; background-position: center;
  border: 1px solid var(--border); display: none; flex-shrink: 0;
}
.auth-google-icon { font-size: 1rem; flex-shrink: 0; }

/* SEEN BADGE */
.seen-badge {
  position: absolute; top: 6px; right: 6px; z-index: 2;
  background: var(--accent); color: #0d1117;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  pointer-events: none;
}
.sp-card.seen-card { border-color: rgba(126,231,135,0.4); }
.sp-img-wrap { position: relative; }

/* My species counter badge in header */
.my-species-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 99px;
  background: rgba(126,231,135,0.08);
  border: 1px solid rgba(126,231,135,0.3);
  color: var(--accent); cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  transition: all 0.2s; flex-shrink: 0; white-space: nowrap;
}
.my-species-btn:hover { background: rgba(126,231,135,0.15); border-color: var(--accent); }
.my-species-count { font-size: 0.85rem; font-weight: 700; }

/* My species page */
.my-species-stats {
  display: flex; gap: 20px; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 24px;
}
.ms-stat { display: flex; flex-direction: column; gap: 2px; }
.ms-stat-val { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--accent); font-weight: 700; }
.ms-stat-key { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.clear-all-btn {
  padding: 7px 14px; border-radius: 6px;
  border: 1px solid var(--accent3); color: var(--accent3);
  background: none; cursor: pointer; font-size: 0.75rem;
  font-family: 'DM Mono', monospace; transition: all 0.2s;
}
.clear-all-btn:hover { background: rgba(247,129,102,0.1); }

.lightbox {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.95); display: flex;
  align-items: center; justify-content: center;
  cursor: zoom-out; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }
.modal-close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.65); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 2; }
.modal-close:hover { border-color: var(--accent3); background: rgba(247,129,102,0.15); }
.modal-body { padding: 28px; }
.modal-sci { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; margin-bottom: 6px; }
.modal-common { color: var(--muted); font-size: 0.92rem; margin-bottom: 20px; }
.modal-stats { display: flex; gap: 24px; background: var(--surface2); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
.ms-val { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); }
.ms-key { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.modal-links { display: flex; gap: 10px; flex-wrap: wrap; }
.modal-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: 1px solid var(--accent2); color: var(--accent2); text-decoration: none; font-size: 0.78rem; font-family: 'DM Mono', monospace; transition: all 0.2s; }
.modal-link:hover { background: rgba(88,166,255,0.1); }

/* MAP */
.map-section { margin-top: 24px; }
.map-label {
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 8px;
}
#speciesMap {
  width: 100%; height: 280px; border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
  background: var(--surface2);
}
.map-loading {
  width: 100%; height: 280px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.75rem;
}
.map-spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent2); border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
.map-note {
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: var(--dim); margin-top: 6px; text-align: right;
}
.leaflet-popup-content-wrapper {
  background: #fff !important; border: 1px solid #ddd !important;
  border-radius: 8px !important; color: #333 !important;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important; font-size: 0.75rem;
}
.leaflet-popup-tip { background: #fff !important; }
.leaflet-popup-content { margin: 8px 12px !important; font-family: 'DM Sans', sans-serif; }
.leaflet-container { background: #f5f5f0 !important; }
.leaflet-tile { filter: none; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {

  /* ── Header ── */
  header { padding: 0 12px; }
  .header-inner { height: 54px; gap: 6px; }
  .logo { font-size: 1rem; }
  .src-badge { display: none; }
  /* Hide "by @..." credits on mobile */
  .header-inner > span:last-child { display: none; }
  /* Shrink auth button to icon only */
  .auth-btn { padding: 5px 8px; }
  .auth-label { display: none; }
  /* Shrink my-species btn */
  .my-species-btn { padding: 5px 8px; gap: 4px; }

  /* ── Filter bar ── */
  .filter-bar { padding: 0 12px; top: 54px; }
  .filter-inner { height: 48px; gap: 6px; }
  .filter-label { display: none; }
  .filter-divider { display: none; }
  .search-wrap { flex: 1; max-width: none; }
  .search-input { font-size: 16px; padding: 6px 26px 6px 28px; }
  .place-wrap { flex: 1; max-width: none; overflow: visible; }
  .place-input { font-size: 16px; }

  /* Dropdowns: full-width fixed below both bars (54+48=102px) */
  .search-dropdown {
    position: fixed; top: 102px; left: 0; right: 0;
    border-radius: 0 0 14px 14px; max-height: 58vh;
    overflow-y: auto; z-index: 500; min-width: unset;
  }
  .place-dropdown {
    position: fixed; left: 0; right: 0; top: 102px;
    border-radius: 0 0 14px 14px; max-height: 72vh;
    overflow-y: auto; z-index: 300;
  }
  .search-result { padding: 12px 16px; gap: 12px; }
  .sr-photo, .sr-no-photo { width: 44px; height: 44px; border-radius: 8px; }
  .sr-name { font-size: 0.95rem; }
  .sr-common { font-size: 0.78rem; }
  .place-result { padding: 12px 16px; font-size: 0.88rem; }
  .place-preview { height: 200px; }
  #placePreviewMap { height: 200px; }

  /* ── Breadcrumb ── */
  .breadcrumb { font-size: 0.7rem; gap: 2px; flex: 1; min-width: 0; }
  .crumb { padding: 2px 4px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }

  /* ── Main content ── */
  main { padding: 16px 12px 80px; }

  /* ── Level header ── */
  .level-header {
    margin-bottom: 16px; gap: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    align-items: start;
  }
  .level-header > div:first-child { grid-column: 1; grid-row: 1; }
  .level-header .all-species-btn { grid-column: 2; grid-row: 1; align-self: center; }
  .level-header .level-sub { grid-column: 1 / -1; grid-row: 2; margin-left: 0; font-size: 0.72rem; }
  .level-title { font-size: 1.45rem; }

  /* Hide "Ver todas las especies" text label, keep icon */
  .all-species-btn .btn-label { display: none; }
  .all-species-btn { padding: 6px 10px; }

  /* ── Taxon card grid ── */
  .card-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .taxon-card { border-radius: 10px; }
  .tc-img-wrap { aspect-ratio: 4/3; }
  .tc-body { padding: 8px 10px 10px; gap: 3px; }
  .tc-name { font-size: 0.88rem; }
  .tc-common { font-size: 0.66rem; }
  .tc-arrow { width: 22px; height: 22px; font-size: 0.78rem; top: 7px; right: 7px; }

  /* ── Kingdom row ── */
  .kingdom-grid { gap: 7px; }
  .kingdom-card { min-width: 130px; border-radius: 12px; }
  .kingdom-icon-wrap { width: 52px; height: 52px; font-size: 1.6rem; }
  .kingdom-img-wrap { width: 52px; height: 52px; }
  .kingdom-body { padding: 9px 10px; gap: 2px; }
  .kingdom-name { font-size: 0.88rem; }
  .kingdom-common { display: none; }
  .kingdom-hint { display: none; }
  .kingdom-arrow { display: none; }

  /* ── Species grid ── */
  .species-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .sp-info { padding: 7px 9px 9px; }
  .sp-sci { font-size: 0.8rem; }
  .sp-common { font-size: 0.68rem; }
  .sp-obs { font-size: 0.6rem; }

  /* Map/phenology buttons: bigger touch targets */
  .map-btn { width: 34px; height: 34px; bottom: 6px; left: 6px; font-size: 0.9rem; }
  .phenology-btn { width: 34px; height: 34px; bottom: 6px; left: 48px; font-size: 0.9rem; }

  /* ── Popovers: full-width sheet at bottom on mobile ── */
  .map-popover, .phenology-popover {
    position: fixed !important;
    left: 8px !important; right: 8px !important;
    bottom: 12px !important; top: auto !important;
    width: auto !important;
    border-radius: 16px;
    transform: none !important;
    max-height: 70vh; overflow-y: auto;
  }
  .map-popover.visible, .phenology-popover.visible {
    transform: none !important;
  }
  .map-popover-map { width: 100% !important; height: 220px; }

  /* ── Modal: bottom sheet ── */
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; max-height: 94vh;
    border-radius: 20px 20px 0 0; border-bottom: none;
    transform: translateY(24px);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { display: block; }
  .modal-body { padding: 18px 14px 36px; }
  .modal-sci { font-size: 1.3rem; line-height: 1.2; }
  .modal-common { font-size: 0.85rem; margin-bottom: 14px; }
  .modal-stats { padding: 12px; gap: 16px; margin-bottom: 14px; }
  .ms-val { font-size: 1.1rem; }
  .modal-links { gap: 8px; }
  .modal-link { padding: 8px 12px; font-size: 0.74rem; }
  .modal-close { top: 10px; right: 10px; width: 30px; height: 30px; font-size: 0.9rem; }
  #speciesMap, .map-loading { height: 200px; }
  .map-section { margin-top: 18px; }

  /* ── All species overlay ── */
  .sp-overlay-header { padding: 0 14px; height: 52px; gap: 10px; }
  .sp-overlay-title { font-size: 1rem; }
  .sp-overlay-meta { font-size: 0.6rem; }
  .sp-overlay-body { padding: 12px 12px 60px; }

  /* ── Loading ── */
  .loading { padding: 50px 16px; }
}

@media (max-width: 380px) {
  .card-grid { grid-template-columns: 1fr 1fr; gap: 7px; }
  .species-grid { grid-template-columns: 1fr 1fr; gap: 7px; }
  .kingdom-card { min-width: 110px; }
  .kingdom-icon-wrap { width: 46px; height: 46px; font-size: 1.35rem; }
  .kingdom-img-wrap { width: 46px; height: 46px; }
  .kingdom-name { font-size: 0.8rem; }
  .header-inner { gap: 4px; }
}
</style>

<body>

<header>
  <div class="header-inner">
    <div class="logo" style="cursor:pointer" id="logoBtn">Bio<em>Explorer</em></div>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <span class="src-badge">● iNaturalist</span>
    <button class="my-species-btn" id="mySpeciesBtn">

    </button>
    <button class="auth-btn" id="authBtn">
      <div class="auth-avatar" id="authAvatar"></div>
      <span class="auth-google-icon">G</span>
      <span class="auth-label">Entrar</span>
    </button>
    <span style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--dim);flex-shrink:0">by @alex_weilong · @berto_wild92 · @aburguillos.wildlife</span>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">📍 Zona</span>
    <div class="place-wrap" id="placeWrap">
      <span class="place-icon">🌍</span>
      <input class="place-input" id="placeInput" type="text" placeholder="Filtrar por zona…"
        autocomplete="off" spellcheck="false" dir="ltr">
      <button class="place-clear" id="placeClear">✕</button>
      <div class="place-dropdown" id="placeDropdown"></div>
    </div>
    <div class="active-place" id="activePlace">
      <span id="activePlaceName"></span>
      <button id="activePlaceClear" title="Quitar filtro">✕</button>
    </div>
    <div class="filter-divider"></div>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar taxón…"
        autocomplete="off" spellcheck="false" dir="ltr">
      <button class="search-clear" id="searchClear">✕</button>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
</div>
<main id="main"></main>

<div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt=""></div>

<!-- MAP POPOVER -->
<div class="map-popover" id="mapPopover">
  <div class="map-popover-header" id="mapPopoverHeader"></div>
  <div id="mapPopoverBody">
    <div class="map-popover-loading" id="mapPopoverLoading">
      <div class="map-spinner" style="width:22px;height:22px;border-top-color:var(--accent2)"></div>
      <span>Cargando mapa…</span>

  </div>

</div>

      <span>Cargando fenología…</span>

  </div>
  <div class="phenology-footer" id="phenologyFooter"></div>
</div>

  <div class="modal" id="modalSheet">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ─── CONFIG ────────────────────────────────────────────────────

const KINGDOMS = [
  {
    id: 'animalia', name: 'Animalia', common: 'Reino Animal', icon: '🐾',
    taxonId: 1, hint: 'explorar filos →',
    photo: 'https://inaturalist-open-data.s3.amazonaws.com/photos/225047126/medium.jpg'
  },
  {

    taxonId: 47126, hint: 'explorar filos →',
    photo: 'https://inaturalist-open-data.s3.amazonaws.com/photos/274532432/medium.jpg'
  },
  {
    id: 'fungi', name: 'Fungi', common: 'Reino Fungi', icon: '🍄',
    taxonId: 47170, hint: 'explorar filos →',
    photo: null
  },
  {
    id: 'chromista', name: 'Chromista', common: 'Algas y similares', icon: '🌊',
    taxonId: 48222, hint: 'explorar filos →',
    photo: null
  },
  {
    id: 'protozoa', name: 'Protozoa', common: 'Protozoos', icon: '🔬',
    taxonId: 47686, hint: 'explorar filos →',
    photo: null
  },
];

const RANK_ES = {
  kingdom: 'Reino', phylum: 'Filo', class: 'Clase', order: 'Orden',
  family: 'Familia', genus: 'Género', species: 'Especie', subspecies: 'Subespecie',
  stateofmatter: 'Estado', subkingdom: 'Subreino', infrakingdom: 'Infrareino',
  superphylum: 'Superfilo', subphylum: 'Subfilo', superclass: 'Superclase',
  subclass: 'Subclase', superorder: 'Superorden', suborder: 'Suborden',
  superfamily: 'Superfamilia', subfamily: 'Subfamilia', tribe: 'Tribu',
  subgenus: 'Subgénero',
};
const RANK_ICONS = {
  kingdom: '🌍', phylum: '🔬', class: '📦', order: '📋',
  family: '🏠', genus: '🔤', species: '🌿', subspecies: '🔬',
};

const NEXT_RANK = {
  kingdom: 'phylum',
  phylum: 'class',
  class: 'order',
  order: 'family',
  family: 'genus',
  genus: 'species',
};

// ─── NAV STATE ─────────────────────────────────────────────────
const navStack = [];

function pushNav(label, renderFn) {
  navStack.push({ label, renderFn });
  history.pushState({ depth: navStack.length }, '', '');
  repaint();
}

function goToNav(index) {
  if (index < 0) navStack.length = 0;
  else navStack.splice(index + 1);
  repaint();
}

function repaint() {
  renderBreadcrumb();
  if (navStack.length === 0) {
    renderHome();
  } else {
    navStack[navStack.length - 1].renderFn();
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!navStack.length) { bc.innerHTML = ''; return; }
  let html = `<span class="crumb" data-nav="-1">Inicio</span>`;
  navStack.forEach((item, i) => {
    html += `<span class="crumb-sep">/</span>`;
    if (i < navStack.length - 1)
      html += `<span class="crumb" data-nav="${i}">${item.label}</span>`;
    else
      html += `<span class="crumb current">${item.label}</span>`;
  });
  bc.innerHTML = html;
  bc.querySelectorAll('.crumb[data-nav]').forEach(el => {
    el.addEventListener('click', () => goToNav(parseInt(el.dataset.nav)));
  });
}

// ─── iNATURALIST API ──────────────────────────────────────────
const API = 'https://api.inaturalist.org/v1';

let activePlaceId = null;
let activePlaceName = '';

const cache = {};
function clearCache() { Object.keys(cache).forEach(k => delete cache[k]); }

async function fetchChildren(parentId, rank) {
  let all = [];
  let page = 1;
  while (true) {
    const url = `${API}/taxa?taxon_id=${parentId}&rank=${rank}&per_page=500&page=${page}&order_by=observations_count&locale=es`;
    const r = await fetch(url);
    if (!r.ok) break;
    const data = await r.json();
    const results = data.results || [];
    all = all.concat(results);
    if (results.length < 500) break;
    if (page >= 10) break;
    page++;
    await new Promise(res => setTimeout(res, 80));
  }
  return all;
}

async function fetchSpeciesGlobal(parentId) {
  const url = `${API}/taxa?taxon_id=${parentId}&rank=species&per_page=100&order_by=observations_count&locale=es`;
  const r = await fetch(url);
  return ((await r.json()).results || []).map(spToObj);
}

function spToObj(sp) {
  return {
    id: sp.id, name: sp.name,
    common: sp.preferred_common_name || '',
    photo: sp.default_photo?.medium_url || sp.default_photo?.url || null,
    observations: sp.observations_count || 0,
    inatUrl: `https://www.inaturalist.org/taxa/${sp.id}`,
    wikipedia: sp.wikipedia_url || null,
    ancestor_ids: sp.ancestor_ids || [],
  };
}

async function fetchSpeciesInPlace(parentId, placeId) {
  let all = [];
  for (let page = 1; page <= 5; page++) {
    const url = `${API}/observations/species_counts?taxon_id=${parentId}&place_id=${placeId}&verifiable=true&captive=false&per_page=100&page=${page}&locale=es`;
    const r = await fetch(url);
    if (!r.ok) break;
    const data = await r.json();
    all = all.concat(data.results || []);
    if ((data.results || []).length < 100) break;
  }
  return all.map(r => ({
    id: r.taxon.id, name: r.taxon.name,
    common: r.taxon.preferred_common_name || '',
    photo: r.taxon.default_photo?.medium_url || r.taxon.default_photo?.url || null,
    observations: r.count || 0,
    inatUrl: `https://www.inaturalist.org/taxa/${r.taxon.id}`,
    wikipedia: r.taxon.wikipedia_url || null,
    ancestor_ids: r.taxon.ancestor_ids || [],
  }));
}

async function fetchChildrenInPlace(parentId, rank, placeId) {
  let allResults = [];
  for (let page = 1; page <= 5; page++) {
    const url = `${API}/observations/species_counts?taxon_id=${parentId}&place_id=${placeId}&verifiable=true&captive=false&per_page=100&page=${page}&locale=es`;
    const r = await fetch(url);
    if (!r.ok) break;
    const data = await r.json();
    allResults = allResults.concat(data.results || []);
    if ((data.results || []).length < 100) break;
  }
  if (!allResults.length) return [];

  const allAncIds = new Set();
  allResults.forEach(r => (r.taxon.ancestor_ids || []).forEach(id => allAncIds.add(id)));

  const ids = [...allAncIds];
  const found = {};
  for (let i = 0; i < ids.length; i += 100) {
    try {
      const r = await fetch(`${API}/taxa?id=${ids.slice(i,i+100).join(',')}&per_page=100&locale=es`);
      const data = await r.json();
      (data.results || []).forEach(t => { if (t.rank === rank) found[t.id] = t; });
    } catch(e) {}
    if (i + 100 < ids.length) await new Promise(res => setTimeout(res, 100));
  }
  return Object.values(found).filter(t => allAncIds.has(t.id));
}

async function cachedChildren(parentId, rank) {
  const key = `ch_${parentId}_${rank}_${activePlaceId||'g'}`;
  if (!cache[key]) cache[key] = activePlaceId
    ? fetchChildrenInPlace(parentId, rank, activePlaceId)
    : fetchChildren(parentId, rank);
  return cache[key];
}

async function cachedSpecies(parentId) {
  const key = `sp_${parentId}_${activePlaceId||'g'}`;
  if (!cache[key]) cache[key] = activePlaceId
    ? fetchSpeciesInPlace(parentId, activePlaceId)
    : fetchSpeciesGlobal(parentId);
  return cache[key];
}

async function fetchPlaceCount(taxonId) {
  const key = `pc_${taxonId}_${activePlaceId}`;
  if (!cache[key]) cache[key] = fetch(
    `${API}/observations/species_counts?taxon_id=${taxonId}&place_id=${activePlaceId}&verifiable=true&captive=false&per_page=1`
  ).then(r => r.ok ? r.json() : null).then(d => d?.total_results ?? 0).catch(() => 0);
  return cache[key];
}

// ─── GENERIC DRILL-DOWN ────────────────────────────────────────
async function enterTaxon(taxonId, taxonName, currentRank) {
  const nextRank = NEXT_RANK[currentRank];
  if (!nextRank) return;

  const nextRankEs = RANK_ES[nextRank] || nextRank;

  showLoading(`Cargando ${nextRankEs}s de <em>${taxonName}</em>…`
    + (activePlaceId ? '<br><small style="color:var(--dim)">Filtrando por zona…</small>' : ''));

  // The renderFn stored in navStack always re-fetches with the current activePlaceId.
  // This means changing the region filter re-renders the same taxon with new data.
  const renderFn = async () => {
    showLoading(`Cargando ${nextRankEs}s de <em>${taxonName}</em>…`
      + (activePlaceId ? '<br><small style="color:var(--dim)">Filtrando por zona…</small>' : ''));
    try {
      if (nextRank === 'species') {
        const species = await cachedSpecies(taxonId);
        if (!species.length) throw new Error(`No se encontraron especies${activePlaceId ? ' en esta zona.' : '.'}`);
        showSpecies({ id: taxonId, name: taxonName, rank: currentRank }, species);
      } else {
        const children = await cachedChildren(taxonId, nextRank);
        if (!children.length) throw new Error(`No se encontraron ${nextRankEs}s${activePlaceId ? ' en esta zona.' : '.'}`);
        showChildrenLevel({ id: taxonId, name: taxonName, rank: currentRank }, children, nextRank);
      }
    } catch(e) {
      // Retry re-calls renderFn directly (not enterTaxon) to avoid double stack push
      showError('Error al cargar', e.message, renderFn);
    }
  };

  try {
    // Initial load
    await renderFn();
    // Only push to stack after successful first load
    navStack.push({ label: taxonName, renderFn });
    history.pushState({ depth: navStack.length }, '', '');
    renderBreadcrumb();
  } catch(e) {
    showError('Error al cargar', e.message, renderFn);
  }
}

// ─── MAP POPOVER ──────────────────────────────────────────────
let popoverMap = null;
let popoverSpId = null;
let popoverCloseTimer = null;
const obsCache = {};

const popover       = document.getElementById('mapPopover');
const popoverHeader = document.getElementById('mapPopoverHeader');
const popoverBody   = document.getElementById('mapPopoverBody');
const popoverFooter = document.getElementById('mapPopoverFooter');

function positionPopover(triggerEl) {
  // On mobile: always show as bottom sheet (CSS handles position via !important)
  if (window.innerWidth <= 768) return;

  const rect = triggerEl.getBoundingClientRect();
  const pw = 300, ph = 260;
  const vw = window.innerWidth, vh = window.innerHeight;

  let left = rect.left + rect.width / 2 - pw / 2;
  let top  = rect.top - ph - 8;

  if (top < 8) top = rect.bottom + 8;
  if (left < 8) left = 8;
  if (left + pw > vw - 8) left = vw - pw - 8;
  if (top + ph > vh - 8) top = vh - ph - 8;

  popover.style.left = left + 'px';
  popover.style.top  = top  + 'px';
}

// Resolve GBIF taxon key from scientific name (cached)
const gbifKeyCache = {};
async function getGbifKey(name) {
  if (gbifKeyCache[name] !== undefined) return gbifKeyCache[name];
  try {
    const r = await fetch(`https://api.gbif.org/v1/species/match?name=${encodeURIComponent(name)}&verbose=false`);
    const d = await r.json();
    gbifKeyCache[name] = (d.matchType !== 'NONE' && d.usageKey) ? d.usageKey : null;
  } catch(e) { gbifKeyCache[name] = null; }
  return gbifKeyCache[name];
}

async function openMapPopover(sp, triggerEl) {
  if (popoverSpId === sp.id && popover.classList.contains('visible')) {
    closeMapPopover();
    return;
  }

  clearTimeout(popoverCloseTimer);
  popoverSpId = sp.id;
  triggerEl.classList.add('active');

  if (popoverMap) { popoverMap.remove(); popoverMap = null; }

  popoverHeader.textContent = sp.name + (sp.common ? ` · ${sp.common}` : '');
  popoverBody.innerHTML = `<div class="map-popover-loading">
    <div class="map-spinner" style="width:22px;height:22px;border-top-color:var(--accent2)"></div>
    <span>Cargando mapa…</span>
  </div>`;
  popoverFooter.textContent = '';

  positionPopover(triggerEl);
  popover.classList.add('visible');
  popover._activeTrigger = triggerEl;

  // Resolve GBIF key in parallel (no blocking)
  const gbifKeyPromise = getGbifKey(sp.name);

  await new Promise(r => setTimeout(r, 30));
  if (popoverSpId !== sp.id) return;

  const mapEl = document.createElement('div');
  mapEl.className = 'map-popover-map';
  mapEl.id = 'mapPopoverMapEl';
  popoverBody.innerHTML = '';
  popoverBody.appendChild(mapEl);

  popoverMap = L.map('mapPopoverMapEl', {
    zoom: 2, center: [20, 0],
    zoomControl: false, attributionControl: false,
  });

  // 1. Base cartography
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(popoverMap);

  // 2. iNaturalist tile — ALL research-grade observations, no limit, no captive
  L.tileLayer(
    `https://api.inaturalist.org/v1/points/{z}/{x}/{y}.png?taxon_id=${sp.id}&color=%232d9e45&quality_grade=research&captive=false`,
    { maxZoom: 19, opacity: 0.85 }
  ).addTo(popoverMap);

  // 3. GBIF tile — added once key resolves
  gbifKeyPromise.then(gbifKey => {
    if (!gbifKey || !popoverMap) return;
    L.tileLayer(
      `https://api.gbif.org/v2/map/occurrence/density/{z}/{x}/{y}@1x.png?taxonKey=${gbifKey}&style=classic.point`,
      { maxZoom: 19, opacity: 0.5 }
    ).addTo(popoverMap);
    popoverFooter.textContent = 'iNaturalist + GBIF · todas las observaciones';
  });

  // 4. Labels on top
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19, opacity: 0.8
  }).addTo(popoverMap);

  popoverFooter.textContent = 'iNaturalist · todas las observaciones';
  setTimeout(() => {
    popoverMap?.invalidateSize();
  }, window.innerWidth <= 768 ? 150 : 30);
}

function closeMapPopover() {
  popover.classList.remove('visible');
  popoverSpId = null;
  if (popover._activeTrigger) {
    popover._activeTrigger.classList.remove('active');
    popover._activeTrigger = null;
  }
  setTimeout(() => {
    if (popoverMap && !popover.classList.contains('visible')) {
      popoverMap.remove(); popoverMap = null;
    }
  }, 220);
}

// ─── PHENOLOGY POPOVER ────────────────────────────────────────
const phenologyPopover = document.getElementById('phenologyPopover');
const phenologyHeader  = document.getElementById('phenologyHeader');
const phenologyBody    = document.getElementById('phenologyBody');
const phenologyFooter  = document.getElementById('phenologyFooter');
let phenologySpId = null;
let phenologySpRef = null;  // keep ref to re-open on region change
let phenologyTriggerRef = null;
const phenologyCache = {};  // key: `${spId}_${placeId||'g'}`
const MONTHS = ['E','F','M','A','M','J','J','A','S','O','N','D'];
const MONTH_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function positionPhenologyPopover(triggerEl) {
  // On mobile: CSS handles it as a bottom sheet
  if (window.innerWidth <= 768) return;

  const rect = triggerEl.getBoundingClientRect();
  const pw = 320, ph = 180;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = rect.left + rect.width / 2 - pw / 2;
  let top  = rect.top - ph - 8;
  if (top < 8) top = rect.bottom + 8;
  if (left < 8) left = 8;
  if (left + pw > vw - 8) left = vw - pw - 8;
  if (top + ph > vh - 8) top = vh - ph - 8;
  phenologyPopover.style.left = left + 'px';
  phenologyPopover.style.top  = top  + 'px';
}

async function fetchPhenologyData(sp) {
  const placeKey = activePlaceId || 'g';
  const cacheKey = `${sp.id}_${placeKey}`;
  if (phenologyCache[cacheKey]) return phenologyCache[cacheKey];

  // iNat histogram — filtered by place if active, always captive=false
  let inatUrl = `https://api.inaturalist.org/v1/observations/histogram?taxon_id=${sp.id}&quality_grade=research&captive=false&date_field=observed&interval=month_of_year`;
  if (activePlaceId) inatUrl += `&place_id=${activePlaceId}`;

  const inatPromise = fetch(inatUrl)
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      const raw = d?.results?.month_of_year || {};
      return Array.from({length:12}, (_,i) => raw[i+1] || 0);
    }).catch(() => Array(12).fill(0));

  // GBIF histogram — only globally (GBIF facet doesn't support region easily)
  // Skip GBIF when region filter is active to avoid misleading data
  const gbifPromise = activePlaceId ? Promise.resolve(Array(12).fill(0)) :
    getGbifKey(sp.name).then(key => {
      if (!key) return Array(12).fill(0);
      return fetch(`https://api.gbif.org/v1/occurrence/search?taxonKey=${key}&basisOfRecord=HUMAN_OBSERVATION&basisOfRecord=MACHINE_OBSERVATION&facet=month&facetLimit=12&limit=0`)
        .then(r => r.ok ? r.json() : null)
        .then(d => {
          const arr = Array(12).fill(0);
          (d?.facets?.[0]?.counts || []).forEach(c => {
            const m = parseInt(c.name) - 1;
            if (m >= 0 && m < 12) arr[m] = c.count;
          });
          return arr;
        }).catch(() => Array(12).fill(0));
    });

  const promise = Promise.all([inatPromise, gbifPromise]).then(([inat, gbif]) => {
    // Normalize scales: iNat and GBIF can have very different magnitudes.
    // Scale GBIF to match iNat's peak so they're visually comparable when merged.
    const inatPeak = Math.max(...inat, 1);
    const gbifPeak = Math.max(...gbif, 1);
    const scale = gbifPeak > 0 ? inatPeak / gbifPeak : 1;
    const merged = inat.map((v, i) => v + gbif[i] * scale);
    return { inat, gbif, merged, hasGbif: !activePlaceId && gbifPeak > 0 };
  });

  phenologyCache[cacheKey] = promise;
  return promise;
}

function renderPhenologyChart(data) {
  const { inat, gbif, merged, hasGbif } = data;
  const mergedMax = Math.max(...merged, 1);

  phenologyBody.innerHTML = `<div class="phenology-body"><div class="phenology-chart" id="phenoChart"></div></div>`;
  const chart = document.getElementById('phenoChart');

  MONTHS.forEach((m, i) => {
    const h = Math.round((merged[i] / mergedMax) * 62);
    // Proportion of iNat vs GBIF within this bar (for gradient split)
    const inatFrac = merged[i] > 0 ? (inat[i] / (inat[i] + gbif[i] * (merged[i] - inat[i] > 0 ? 1 : 1))) : 1;
    const inatH = hasGbif ? Math.round(h * (inat[i] / Math.max(inat[i] + gbif[i], 1))) : h;
    const gbifH = h - inatH;

    const inatTotal = inat[i].toLocaleString();
    const gbifTotal = gbif[i].toLocaleString();
    const tip = hasGbif ? `iNat: ${inatTotal} · GBIF: ${gbifTotal}` : `iNat: ${inatTotal}`;

    const wrap = document.createElement('div');
    wrap.className = 'phenology-bar-wrap';
    wrap.title = `${MONTH_FULL[i]} — ${tip}`;
    // Single stacked bar: iNat (green bottom) + GBIF (orange top)
    wrap.innerHTML = `
      <div style="display:flex;flex-direction:column;justify-content:flex-end;height:62px;width:100%;cursor:default">
        ${hasGbif && gbifH > 0 ? `<div style="width:100%;height:${gbifH}px;background:#e36d1e;border-radius:${inatH > 0 ? '0' : '3px 3px'} 0 0;opacity:0.85"></div>` : ''}
        ${inatH > 0 ? `<div style="width:100%;height:${inatH}px;background:#2d9e45;border-radius:${(!hasGbif || gbifH===0) ? '3px 3px' : '0 0'} 0 0;opacity:0.9"></div>` : ''}
        ${h === 0 ? `<div style="width:100%;height:2px;background:var(--border);border-radius:1px"></div>` : ''}
      </div>
      <div class="phenology-month">${m}</div>
    `;
    chart.appendChild(wrap);
  });

  const inatTotal = inat.reduce((a,b)=>a+b,0);
  const gbifTotal = gbif.reduce((a,b)=>a+b,0);
  const regionTag = activePlaceId ? `<span style="color:var(--accent2)">📍 ${activePlaceName}</span>` : '<span>🌍 Global</span>';

  phenologyFooter.innerHTML = `

  return n.toString();
}

async function loadGallery(sp) {
  const url = `${API}/observations?taxon_id=${sp.id}&quality_grade=research&photos=true&per_page=24&order_by=votes&locale=es`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const obs = data.results || [];
    const seen = new Set();
    galleryPhotos = [];
    if (sp.photo) {
      const large = sp.photo.replace('medium', 'large');
      seen.add(large);
      galleryPhotos.push({ url: large, thumb: sp.photo, attr: '' });
    }
    obs.forEach(o => {
      (o.photos || []).forEach(p => {
        const large = (p.url || '').replace('square', 'large').replace('medium', 'large');
        const thumb = (p.url || '').replace('square', 'small').replace('medium', 'small');
        if (large && !seen.has(large)) {
          seen.add(large);
          galleryPhotos.push({ url: large, thumb, attr: p.attribution || '' });
        }
      });
    });
    galleryIndex = 0;
    renderGallery();
  } catch(e) {
    galleryPhotos = sp.photo ? [{ url: sp.photo.replace('medium','large'), thumb: sp.photo, attr: '' }] : [];
    galleryIndex = 0;
    renderGallery();
  }
}

function renderGallery() {
  const wrap = document.getElementById('galleryWrap');
  if (!wrap) return;
  if (!galleryPhotos.length) { wrap.innerHTML = `<div style="width:100%;aspect-ratio:16/9;background:var(--surface2);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:center;font-size:4rem">📷</div>`; return; }
  const p = galleryPhotos[galleryIndex];
  const total = galleryPhotos.length;
  wrap.innerHTML = `
    <img class="gallery-main" id="galleryMain" src="${p.url}" alt=""
      onerror="this.src='${galleryPhotos[galleryIndex]?.thumb || ''}'">
    ${total > 1 ? `<div class="gallery-counter">${galleryIndex + 1} / ${total}</div>` : ''}
    ${galleryIndex > 0 ? `<button class="gallery-nav prev" id="galleryPrev">‹</button>` : ''}
    ${galleryIndex < total - 1 ? `<button class="gallery-nav next" id="galleryNext">›</button>` : ''}
    ${p.attr ? `<div class="gallery-caption">${p.attr}</div>` : ''}
    ${total > 1 ? `
      <div class="gallery-thumbs" id="galleryThumbs">
        ${galleryPhotos.map((ph, i) => `
          <img class="gallery-thumb ${i === galleryIndex ? 'active' : ''}"
            src="${ph.thumb}" data-i="${i}" alt=""
            onerror="this.style.display='none'">`).join('')}
      </div>` : ''}
  `;
  document.getElementById('galleryMain')?.addEventListener('click', () => openLightbox(p.url));
  document.getElementById('galleryPrev')?.addEventListener('click', () => { galleryIndex--; renderGallery(); });
  document.getElementById('galleryNext')?.addEventListener('click', () => { galleryIndex++; renderGallery(); });
  document.getElementById('galleryThumbs')?.querySelectorAll('.gallery-thumb').forEach(el => {
    el.addEventListener('click', () => { galleryIndex = +el.dataset.i; renderGallery(); });
  });
  wrap._keyHandler = e => {
    if (e.key === 'ArrowLeft'  && galleryIndex > 0) { galleryIndex--; renderGallery(); }
    if (e.key === 'ArrowRight' && galleryIndex < galleryPhotos.length - 1) { galleryIndex++; renderGallery(); }
  };
  document.removeEventListener('keydown', wrap._keyHandler);
  document.addEventListener('keydown', wrap._keyHandler);
  setTimeout(() => {
    document.querySelector('.gallery-thumb.active')?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

async function loadMap(sp) {
  try {
    document.getElementById('mapLoading').style.display = 'none';
    const mapEl = document.getElementById('speciesMap');
    mapEl.style.display = 'block';

    const map = L.map('speciesMap', { zoom: 2, center: [20, 0], zoomControl: true, attributionControl: false });
    currentMap = map;

    // 1. Base cartography
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    // 2. iNaturalist tile — ALL research-grade observations, no captive
    L.tileLayer(
      `https://api.inaturalist.org/v1/points/{z}/{x}/{y}.png?taxon_id=${sp.id}&color=%232d9e45&quality_grade=research&captive=false`,
      { maxZoom: 19, opacity: 0.85 }
    ).addTo(map);

    // 3. GBIF tile — resolve key then add layer
    const noteEl = document.getElementById('mapNote');
    noteEl.textContent = 'iNaturalist · todas las observaciones';

    getGbifKey(sp.name).then(gbifKey => {
      if (!gbifKey || !currentMap) return;
      L.tileLayer(
        `https://api.gbif.org/v2/map/occurrence/density/{z}/{x}/{y}@1x.png?taxonKey=${gbifKey}&style=classic.point`,
        { maxZoom: 19, opacity: 0.5 }
      ).addTo(map);

      // Layer toggle controls
      noteEl.innerHTML = `
        <span style="display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="color:#2d9e45;font-weight:600">● iNaturalist</span>
          <span style="color:#e36d1e;font-weight:600">● GBIF</span>
          <span style="color:var(--dim)">· todas las observaciones · sin límite</span>
        </span>`;
    });

    // 4. Labels on top
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, opacity: 0.8
    }).addTo(map);

  } catch(e) {
    document.getElementById('mapLoading').innerHTML = '<span style="color:var(--dim)">No se pudo cargar el mapa</span>';
  }
}

(function() {
  const sheet = document.getElementById('modalSheet');
  let startY = 0, isDragging = false;
  sheet.addEventListener('touchstart', e => {
    if (e.target.classList.contains('modal-handle') || e.touches[0].clientY - sheet.getBoundingClientRect().top < 60) {
      startY = e.touches[0].clientY; isDragging = true; sheet.style.transition = 'none';
    }
  }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false; sheet.style.transition = '';
    if (e.changedTouches[0].clientY - startY > 120) closeModal();
    else sheet.style.transform = '';
  });
})();

async function doSearch(q) {
  try {
    const url = `https://api.inaturalist.org/v1/taxa/autocomplete?q=${encodeURIComponent(q)}&per_page=10&locale=es`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    searchResults = data.results || [];
    renderSearchDropdown(searchResults, q);
  } catch(e) {
    searchDropdown.innerHTML = `<div class="search-msg">Error al buscar</div>`;
  }
}

function renderSearchDropdown(results, q) {
  searchFocusIndex = -1;
  if (!results.length) {
    searchDropdown.innerHTML = `<div class="search-msg">Sin resultados para "${q}"</div>`;
    return;
  }
  searchDropdown.innerHTML = '';
  results.forEach((taxon, i) => {
    const photo = taxon.default_photo?.square_url;
    const rank  = taxon.rank || '';
    const icon  = RANK_ICONS[rank] || '🔬';
    const rankEs = RANK_ES[rank] || rank;
    const el = document.createElement('div');
    el.className = 'search-result';
    el.innerHTML = `
      ${photo
        ? `<img class="sr-photo" src="${photo}" alt="" onerror="this.outerHTML='<div class=\\'sr-no-photo\\'>${icon}</div>'">`
        : `<div class="sr-no-photo">${icon}</div>`}

        <div class="sr-name">${taxon.name}</div>
        ${taxon.preferred_common_name ? `<div class="sr-common">${taxon.preferred_common_name}</div>` : ''}
      </div>
      <span class="sr-rank">${rankEs}</span>
    `;
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => selectSearchResult(taxon));
    searchDropdown.appendChild(el);
  });
}

async function selectSearchResult(taxon) {
  closeDropdown();
  searchInput.value = '';
  searchClear.classList.remove('visible');

  const rank = taxon.rank;

  if (rank === 'species' || rank === 'subspecies') {
    openModal({
      id: taxon.id, name: taxon.name,
      common: taxon.preferred_common_name || '',
      photo: taxon.default_photo?.medium_url || taxon.default_photo?.url || null,
      observations: taxon.observations_count || 0,
      inatUrl: `https://www.inaturalist.org/taxa/${taxon.id}`,
      wikipedia: taxon.wikipedia_url || null,
      ancestor_ids: taxon.ancestor_ids || [],
    });
    return;
  }

  navStack.length = 0;
  history.replaceState({ depth: 0 }, '', '');
  await enterTaxon(taxon.id, taxon.name, rank);
}
