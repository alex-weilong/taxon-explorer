<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioExplorer</title>
<meta name="description" content="Explorador taxonómico de biodiversidad">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BioExplorer">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #7ee787;
  --accent2: #58a6ff;
  --accent3: #f78166;
  --text: #e6edf3;
  --muted: #8b949e;
  --dim: #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(126,231,135,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(126,231,135,0.025) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 40px;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 20px; height: 62px;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.logo em { color: var(--accent); font-style: italic; }
.breadcrumb {
  display: flex; align-items: center; gap: 4px;
  font-family: 'DM Mono', monospace; font-size: 0.78rem;
  flex: 1; min-width: 0; overflow: hidden;
}
.crumb { color: var(--muted); cursor: pointer; padding: 3px 7px; border-radius: 4px; white-space: nowrap; transition: all 0.15s; }
.crumb:hover { color: var(--text); background: var(--surface2); }
.crumb.current { color: var(--text); cursor: default; overflow: hidden; text-overflow: ellipsis; }
.crumb.current:hover { background: none; }
.crumb-sep { color: var(--dim); flex-shrink: 0; }
.src-badge {
  flex-shrink: 0; margin-left: auto;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px; font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  border: 1px solid rgba(126,231,135,0.35);
  color: var(--accent); background: rgba(126,231,135,0.04);
}

/* MAIN */
main { max-width: 1400px; margin: 0 auto; padding: 40px 40px 80px; position: relative; z-index: 1; }

/* LEVEL HEADER */
.level-header { margin-bottom: 32px; display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.level-rank {
  font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--dim); border: 1px solid var(--dim);
  padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px;
}
.level-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.7rem); font-weight: 700; line-height: 1; font-style: italic; }
.level-sub { color: var(--muted); font-size: 0.83rem; margin-left: auto; font-family: 'DM Mono', monospace; white-space: nowrap; }

/* CARD GRID */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

.taxon-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}
.taxon-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }

/* Photo area */
.tc-img-wrap {
  width: 100%; aspect-ratio: 3/2; overflow: hidden;
  background: var(--surface2); flex-shrink: 0; position: relative;
}
.tc-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
.taxon-card:hover .tc-img { transform: scale(1.06); }
.tc-no-img {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 2rem;
}

/* Text area */
.tc-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.tc-arrow { position: absolute; top: 10px; right: 10px; color: white; font-size: 0.9rem; background: rgba(0,0,0,0.45); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(4px); z-index: 1; }
.taxon-card:hover .tc-arrow { background: var(--accent); color: #0d1117; transform: translateX(2px); }
.tc-rank { font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
.tc-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.05rem; line-height: 1.2; color: var(--text); }
.tc-common { font-size: 0.74rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tc-pill { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 99px; }

/* SPECIES GRID */
.species-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 14px; animation: fadeUp 0.3s ease both;
}
.sp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.22s; }
.sp-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.sp-img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: var(--surface2); }
.sp-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.sp-card:hover .sp-img { transform: scale(1.06); }
.sp-no-img { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--dim); font-size: 1.8rem; }
.sp-no-img small { font-size: 0.62rem; font-family: 'DM Mono', monospace; }
.sp-info { padding: 10px 12px; }
.sp-sci { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.84rem; color: var(--accent); line-height: 1.3; }
.sp-common { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-obs { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--dim); margin-top: 6px; }

/* GROUP HOME */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; animation: fadeUp 0.3s ease both; }
.group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px 22px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 10px; }
.group-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 32px rgba(0,0,0,0.4); }
.group-icon { font-size: 2.2rem; }
.group-name { font-size: 1rem; font-weight: 500; }
.group-hint { font-size: 0.7rem; color: var(--dim); font-family: 'DM Mono', monospace; }

/* LOADING */
.loading { text-align: center; padding: 100px 20px; }
.spinner { width: 42px; height: 42px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.82rem; }
.loading-sub { color: var(--dim); font-size: 0.7rem; margin-top: 8px; }

/* FILTER BAR */
.filter-bar {
  background: rgba(13,17,23,0.93); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px; position: sticky; top: 62px; z-index: 99;
}
.filter-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 48px;
}
.filter-label {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--dim); white-space: nowrap; flex-shrink: 0;
}
.place-wrap { position: relative; flex: 1; max-width: 320px; }
.place-input {
  width: 100%; padding: 6px 28px 6px 30px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
}
.place-input:focus { border-color: var(--accent2); }
.place-input::placeholder { color: var(--dim); }
.place-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; pointer-events: none; }
.place-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--dim); cursor: pointer;
  font-size: 0.9rem; display: none; padding: 2px; line-height: 1;
  transition: color 0.15s;
}
.place-clear.visible { display: block; }
.place-clear:hover { color: var(--text); }

.place-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.place-dropdown.open { display: block; }
.place-result {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; cursor: pointer;
  transition: background 0.12s; border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.place-result:last-child { border-bottom: none; }
.place-result:hover, .place-result.focused { background: var(--surface2); }
.pr-icon { font-size: 1rem; flex-shrink: 0; }
.pr-name { flex: 1; color: var(--text); }
.pr-type { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }
.place-msg { padding: 10px 12px; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.72rem; text-align: center; }

/* Place preview map panel */
.place-preview {
  border-top: 1px solid var(--border);
  height: 180px; position: relative;
  background: var(--surface2); display: none;
}
.place-preview.visible { display: block; }
.place-preview-label {
  position: absolute; bottom: 8px; left: 8px; z-index: 10;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: white; background: rgba(0,0,0,0.55);
  padding: 3px 8px; border-radius: 4px;
  backdrop-filter: blur(4px); max-width: 80%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  pointer-events: none;
}
#placePreviewMap { width: 100%; height: 100%; }

.active-place {
  display: none; align-items: center; gap: 8px;
  padding: 4px 10px; border-radius: 99px;
  background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.35);
  font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--accent2);
}
.active-place.visible { display: flex; }
.active-place button {
  background: none; border: none; color: var(--accent2);
  cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1;
  opacity: 0.7; transition: opacity 0.15s;
}
.active-place button:hover { opacity: 1; }

/* MAIN offset when filter bar visible */
.has-filter main { padding-top: 28px; }

@media (max-width: 768px) {
  .filter-bar { padding: 0 16px; top: 54px; }
  .filter-inner { height: 42px; gap: 8px; }
  .filter-label { display: none; }
  .place-wrap { max-width: 100%; }
}

/* SEARCH */
.search-wrap {
  position: relative; flex: 1; max-width: 340px;
}
.search-input {
  width: 100%; padding: 8px 14px 8px 36px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--dim); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  font-size: 0.9rem; pointer-events: none;
}
.search-clear {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%); color: var(--dim);
  background: none; border: none; cursor: pointer;
  font-size: 1rem; display: none; padding: 2px 4px;
  line-height: 1; border-radius: 4px;
  transition: color 0.15s;
}
.search-clear:hover { color: var(--text); }
.search-clear.visible { display: block; }

.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden; display: none;
}
.search-dropdown.open { display: block; }

.search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  transition: background 0.15s; border-bottom: 1px solid var(--border);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover, .search-result.focused { background: var(--surface2); }

.sr-photo {
  width: 40px; height: 40px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface2);
}
.sr-no-photo {
  width: 40px; height: 40px; border-radius: 6px;
  background: var(--surface2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.sr-info { flex: 1; min-width: 0; }
.sr-name {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.88rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-common {
  font-size: 0.72rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-rank {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.08em; flex-shrink: 0;
}
.search-msg {
  padding: 12px 14px; color: var(--dim);
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  text-align: center;
}

/* ERROR */
.error-box { text-align: center; padding: 80px 20px; }
.error-box h3 { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent3); font-size: 1.4rem; margin-bottom: 8px; }
.error-box p { color: var(--muted); font-size: 0.82rem; font-family: 'DM Mono', monospace; max-width: 480px; margin: 0 auto; }
.retry-btn { margin-top: 20px; padding: 8px 20px; border: 1px solid var(--accent); color: var(--accent); background: none; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.8rem; transition: all 0.2s; }
.retry-btn:hover { background: rgba(126,231,135,0.08); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.82); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; transform: scale(0.96); transition: transform 0.2s; position: relative; }
.modal-overlay.open .modal { transform: scale(1); }
.modal-handle { display: none; width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-photo { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 16px 16px 0 0; display: block; }
.modal-no-photo { width: 100%; aspect-ratio: 16/9; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 4rem; border-radius: 16px 16px 0 0; }

/* GALLERY */
.gallery-wrap { position: relative; background: #000; border-radius: 16px 16px 0 0; overflow: hidden; }
.gallery-main { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; cursor: zoom-in; transition: opacity 0.2s; }
.gallery-main.loading { opacity: 0.4; }
.gallery-counter {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  background: rgba(0,0,0,0.6); color: #fff; border-radius: 99px;
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  padding: 3px 10px; backdrop-filter: blur(4px);
}
.gallery-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; backdrop-filter: blur(4px);
  transition: all 0.2s; z-index: 2;
}
.gallery-nav:hover { background: rgba(126,231,135,0.3); border-color: var(--accent); }
.gallery-nav.prev { left: 10px; }
.gallery-nav.next { right: 10px; }
.gallery-nav:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
.gallery-thumbs {
  display: flex; gap: 6px; padding: 8px 12px;
  background: rgba(0,0,0,0.7); overflow-x: auto;
  position: absolute; bottom: 0; left: 0; right: 0;
  scrollbar-width: none;
}
.gallery-thumbs::-webkit-scrollbar { display: none; }
.gallery-thumb {
  width: 52px; height: 40px; object-fit: cover;
  border-radius: 5px; cursor: pointer; flex-shrink: 0;
  border: 2px solid transparent; transition: all 0.15s; opacity: 0.6;
}
.gallery-thumb.active { border-color: var(--accent); opacity: 1; }
.gallery-thumb:hover { opacity: 0.9; }
.gallery-caption {
  position: absolute; bottom: 56px; left: 0; right: 0;
  padding: 4px 12px;
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  color: rgba(255,255,255,0.6); text-align: right;
  pointer-events: none;
}
.gallery-loading-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: var(--surface2);
  border-radius: 16px 16px 0 0;
}
/* AUTH BUTTON */
.auth-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 5px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; flex-shrink: 0;
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  transition: all 0.2s; white-space: nowrap;
}
.auth-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.auth-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background-size: cover; background-position: center;
  border: 1px solid var(--border); display: none; flex-shrink: 0;
}
.auth-google-icon { font-size: 1rem; flex-shrink: 0; }

/* SEEN SPECIES SYSTEM */
.seen-btn {
  position: absolute; bottom: 8px; right: 8px; z-index: 2;
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.7); font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.seen-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,0,0,0.6); }
.seen-btn.seen { background: var(--accent); border-color: var(--accent); color: #0d1117; }
.sp-card.seen-card { border-color: rgba(126,231,135,0.4); }
.sp-card.seen-card .sp-img-wrap::after {
  content: '✓';
  position: absolute; top: 6px; right: 6px;
  background: var(--accent); color: #0d1117;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700;
}
.sp-img-wrap { position: relative; }

/* My species counter badge in header */
.my-species-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 99px;
  background: rgba(126,231,135,0.08);
  border: 1px solid rgba(126,231,135,0.3);
  color: var(--accent); cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  transition: all 0.2s; flex-shrink: 0; white-space: nowrap;
}
.my-species-btn:hover { background: rgba(126,231,135,0.15); border-color: var(--accent); }
.my-species-count { font-size: 0.85rem; font-weight: 700; }

/* My species page */
.my-species-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
}
.my-species-stats {
  display: flex; gap: 20px; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 24px;
}

/* Modal seen button */
.modal-seen-btn {

.lightbox {

.modal-close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.65); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 2; }

/* Override Leaflet popup styles */

@media (max-width: 768px) {

    border-radius: 0 0 12px 12px;
    max-height: 75vh;

<body>

<header>
  <div class="header-inner">

    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="search-wrap" id="searchWrap">

    <span class="src-badge">● iNaturalist</span>

</header>

<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">📍 Zona</span>
    <div class="place-wrap" id="placeWrap">

      <div class="place-dropdown" id="placeDropdown">
        <div class="place-preview" id="placePreview">
          <div id="placePreviewMap"></div>

      <span id="activePlaceName"></span>
      <button id="activePlaceClear" title="Quitar filtro">✕</button>
    </div>

</div>
<main id="main"></main>

<div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt=""></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalSheet">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module">
// ─── CONFIG ────────────────────────────────────────────────────
const GROUPS = [
  { id: 'reptilia',       name: 'Reptiles',   icon: '🦎', taxonId: 26036  },
  { id: 'aves',           name: 'Aves',        icon: '🦅', taxonId: 3      },
  { id: 'mammalia',       name: 'Mamíferos',   icon: '🦁', taxonId: 40151  },
  { id: 'amphibia',       name: 'Anfibios',    icon: '🐸', taxonId: 20978  },
  { id: 'arachnida',      name: 'Arácnidos',   icon: '🕷️', taxonId: 47119  },
  { id: 'insecta',        name: 'Insectos',    icon: '🦋', taxonId: 47158  },
  { id: 'actinopterygii', name: 'Peces',       icon: '🐠', taxonId: 47178  },
  { id: 'plantae',        name: 'Plantas',     icon: '🌿', taxonId: 47126  },
];

// iNaturalist rank IDs (used as next_rank lookup)
const RANK_SEQUENCE = ['order', 'family', 'genus', 'species'];

// ─── NAV STATE ─────────────────────────────────────────────────
const navStack = []; // { label, renderFn }

function pushNav(label, renderFn) {
  navStack.push({ label, renderFn });
  // Push a new browser history entry so the back button works
  history.pushState({ depth: navStack.length }, '', '');
  repaint();
}

function goToNav(index) {
  if (index < 0) navStack.length = 0;
  else navStack.splice(index + 1);
  repaint();
}

function repaint() {
  renderBreadcrumb();
  navStack.length === 0 ? renderHome() : navStack[navStack.length - 1].renderFn();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!navStack.length) { bc.innerHTML = ''; return; }
  let html = `<span class="crumb" data-nav="-1">Inicio</span>`;
  navStack.forEach((item, i) => {
    html += `<span class="crumb-sep">/</span>`;
    if (i < navStack.length - 1)
      html += `<span class="crumb" data-nav="${i}">${item.label}</span>`;
    else
      html += `<span class="crumb current">${item.label}</span>`;
  });
  bc.innerHTML = html;
  bc.querySelectorAll('.crumb[data-nav]').forEach(el => {
    el.addEventListener('click', () => goToNav(parseInt(el.dataset.nav)));
  });
}

// Intercept the browser back/forward buttons
window.addEventListener('popstate', () => {
  // If modal is open, close it first
  if (document.getElementById('modalOverlay').classList.contains('open')) {
    closeModal();
    // Push state again so next back goes to previous nav level
    history.pushState({ depth: navStack.length }, '', '');
    return;
  }
  // Otherwise go back one nav level
  if (navStack.length > 0) {
    navStack.pop();
    repaint();
  }
});

// On first load, set an initial history entry
history.replaceState({ depth: 0 }, '', '');

// ─── iNATURALIST API ──────────────────────────────────────────
const API = 'https://api.inaturalist.org/v1';

let activePlaceId = null;
let activePlaceName = '';

// Single cache — cleared completely when place changes
const cache = {};
function clearCache() { Object.keys(cache).forEach(k => delete cache[k]); }

// ── Global: children by rank ──────────────────────────────────
async function fetchChildren(parentId, rank) {
  const url = `${API}/taxa?taxon_id=${parentId}&rank=${rank}&per_page=50&order_by=observations_count&locale=es`;
  const r = await fetch(url);
  return (await r.json()).results || [];
}

// ── Global: species list ──────────────────────────────────────
async function fetchSpeciesGlobal(parentId) {
  const url = `${API}/taxa?taxon_id=${parentId}&rank=species&per_page=100&order_by=observations_count&locale=es`;
  const r = await fetch(url);
  return ((await r.json()).results || []).map(sp => ({
    id: sp.id, name: sp.name,
    common: sp.preferred_common_name || '',
    photo: sp.default_photo?.medium_url || sp.default_photo?.url || null,
    observations: sp.observations_count || 0,
    inatUrl: `https://www.inaturalist.org/taxa/${sp.id}`,
    wikipedia: sp.wikipedia_url || null,
  }));
}

// ── Place: species observed in place ─────────────────────────
async function fetchSpeciesInPlace(parentId, placeId) {
  let all = [];
  for (let page = 1; page <= 5; page++) {
    const url = `${API}/observations/species_counts?taxon_id=${parentId}&place_id=${placeId}&per_page=100&page=${page}&locale=es`;
    const r = await fetch(url);
    if (!r.ok) break;
    const data = await r.json();
    all = all.concat(data.results || []);
    if ((data.results || []).length < 100) break;
  }
  return all.map(r => ({
    id: r.taxon.id, name: r.taxon.name,
    common: r.taxon.preferred_common_name || '',
    photo: r.taxon.default_photo?.medium_url || r.taxon.default_photo?.url || null,
    observations: r.count || 0,
    inatUrl: `https://www.inaturalist.org/taxa/${r.taxon.id}`,
    wikipedia: r.taxon.wikipedia_url || null,
    ancestor_ids: r.taxon.ancestor_ids || [],
  }));
}

// ── Place: children at a given rank ──────────────────────────
// Gets all species in place → extracts ancestor_ids → batch-resolves
// them to find which ancestors match the requested rank.
async function fetchChildrenInPlace(parentId, rank, placeId) {
  let allResults = [];
  for (let page = 1; page <= 5; page++) {
    const url = `${API}/observations/species_counts?taxon_id=${parentId}&place_id=${placeId}&per_page=100&page=${page}&locale=es`;
    const r = await fetch(url);
    if (!r.ok) break;
    const data = await r.json();
    allResults = allResults.concat(data.results || []);
    if ((data.results || []).length < 100) break;
  }
  if (!allResults.length) return [];

  // All ancestor IDs seen across all species
  const allAncIds = new Set();
  allResults.forEach(r => (r.taxon.ancestor_ids || []).forEach(id => allAncIds.add(id)));

  // Batch-fetch those ancestors to find which are at the requested rank
  const ids = [...allAncIds];
  const found = {};
  for (let i = 0; i < ids.length; i += 100) {
    try {
      const r = await fetch(`${API}/taxa?id=${ids.slice(i,i+100).join(',')}&per_page=100&locale=es`);
      const data = await r.json();
      (data.results || []).forEach(t => { if (t.rank === rank) found[t.id] = t; });
    } catch(e) {}
    if (i + 100 < ids.length) await new Promise(res => setTimeout(res, 100));
  }

  return Object.values(found).filter(t => allAncIds.has(t.id));
}

// ── Cached accessors ─────────────────────────────────────────
async function cachedChildren(parentId, rank) {
  const key = `ch_${parentId}_${rank}_${activePlaceId||'g'}`;
  if (!cache[key]) cache[key] = activePlaceId
    ? fetchChildrenInPlace(parentId, rank, activePlaceId)
    : fetchChildren(parentId, rank);
  return cache[key];
}

async function cachedSpecies(parentId) {
  const key = `sp_${parentId}_${activePlaceId||'g'}`;
  if (!cache[key]) cache[key] = activePlaceId
    ? fetchSpeciesInPlace(parentId, activePlaceId)
    : fetchSpeciesGlobal(parentId);
  return cache[key];
}

// ── Place count for pill badges ───────────────────────────────
async function fetchPlaceCount(taxonId) {
  const key = `pc_${taxonId}_${activePlaceId}`;
  if (!cache[key]) cache[key] = fetch(
    `${API}/observations/species_counts?taxon_id=${taxonId}&place_id=${activePlaceId}&per_page=1`
  ).then(r => r.ok ? r.json() : null).then(d => d?.total_results ?? 0).catch(() => 0);
  return cache[key];
}

// ─── HOME ──────────────────────────────────────────────────────

// Cache for species counts per taxon+place
// Renders a grid of taxon cards, updating pills with place counts asynchronously
async function renderCardGrid(items, rankLabel, clickFn, getPhotoFn) {
  const grid = document.getElementById('grid');
  items.forEach(item => {
    const globalCount = item.complete_species_count;
    const pillText = activePlaceId ? '…' : (globalCount ? `${globalCount.toLocaleString()} especies` : '—');
    const card = makeCard(rankLabel, item.name, item.preferred_common_name || '',
      [pillText], getPhotoFn(item));
    card.addEventListener('click', () => clickFn(item));
    grid.appendChild(card);
  });
  if (activePlaceId) {
    const cards = [...grid.querySelectorAll('.taxon-card')];
    await Promise.all(items.map(async (item, i) => {
      const count = await fetchPlaceCount(item.id);
      const pill = cards[i]?.querySelector('.tc-pill');
      if (pill) { pill.textContent = `${count.toLocaleString()} especies`; pill.style.color = 'var(--accent2)'; }
    }));
  }
}

function renderHome() {
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Explorador</div>
        <div class="level-title">Grupos taxonómicos</div>
      </div>
    </div>
    <div class="group-grid" id="groupGrid"></div>
  `;
  GROUPS.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-icon">${g.icon}</div>
      <div class="group-name">${g.name}</div>
      <div class="group-hint">explorar órdenes →</div>
    `;
    card.addEventListener('click', () => enterGroup(g));
    document.getElementById('groupGrid').appendChild(card);
  });
}

// ─── ENTER GROUP → fetch orders ────────────────────────────────
async function enterGroup(group) {
  showLoading(`Cargando órdenes de ${group.name}…`);
  try {
    const orders = await cachedChildren(group.taxonId, 'order');
    if (!orders.length) throw new Error('No se encontraron órdenes. Intenta con otro grupo.');
    pushNav(group.name, () => showOrders(group, orders));
  } catch(e) {
    showError('Error al cargar', e.message, () => enterGroup(group));
  }
}

// ─── LEVEL: ORDERS ────────────────────────────────────────────
function showOrders(group, orders) {
  const sorted = [...orders].sort((a, b) => a.name.localeCompare(b.name));
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Clase</div>
        <div class="level-title">${group.icon} ${group.name}</div>
      </div>
      <div class="level-sub">${sorted.length} órdenes</div>
    </div>
    <div class="card-grid" id="grid"></div>
  `;
  renderCardGrid(sorted, 'Orden', enterOrder,
    item => item.default_photo?.medium_url || item.default_photo?.url || null);
}

async function enterOrder(order) {
  showLoading(`Cargando familias de ${order.name}…` + (activePlaceId ? '<br><small style="color:var(--dim)">Filtrando por zona…</small>' : ''));
  try {
    const families = await cachedChildren(order.id, 'family');
    if (!families.length) throw new Error('No se encontraron familias' + (activePlaceId ? ' en esta zona.' : '.'));
    pushNav(order.name, () => showFamilies(order, families));
  } catch(e) {
    showError('Error al cargar', e.message, () => enterOrder(order));
  }
}

// ─── LEVEL: FAMILIES ──────────────────────────────────────────
function showFamilies(order, families) {
  const sorted = [...families].sort((a, b) => a.name.localeCompare(b.name));
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Orden</div>
        <div class="level-title">${order.name}</div>
      </div>
      <div class="level-sub">${sorted.length} familias</div>
    </div>
    <div class="card-grid" id="grid"></div>
  `;
  renderCardGrid(sorted, 'Familia', enterFamily,
    item => item.default_photo?.medium_url || item.default_photo?.url || null);
}

async function enterFamily(fam) {
  showLoading(`Cargando géneros de ${fam.name}…` + (activePlaceId ? '<br><small style="color:var(--dim)">Filtrando por zona…</small>' : ''));
  try {
    const genera = await cachedChildren(fam.id, 'genus');
    if (!genera.length) throw new Error('No se encontraron géneros' + (activePlaceId ? ' en esta zona.' : '.'));
    pushNav(fam.name, () => showGenera(fam, genera));
  } catch(e) {
    showError('Error al cargar', e.message, () => enterFamily(fam));
  }
}

// ─── LEVEL: GENERA ────────────────────────────────────────────
function showGenera(fam, genera) {
  const sorted = [...genera].sort((a, b) => a.name.localeCompare(b.name));
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Familia</div>
        <div class="level-title">${fam.name}</div>
      </div>
      <div class="level-sub">${sorted.length} géneros</div>
    </div>
    <div class="card-grid" id="grid"></div>
  `;
  renderCardGrid(sorted, 'Género', enterGenus,
    item => item.default_photo?.medium_url || item.default_photo?.url || null);
}

async function enterGenus(genus) {
  showLoading(`Cargando especies de ${genus.name}…` + (activePlaceId ? '<br><small style="color:var(--dim)">Filtrando por zona…</small>' : ''));
  try {
    const species = await cachedSpecies(genus.id);
    if (!species.length) throw new Error('No se encontraron especies' + (activePlaceId ? ' en esta zona.' : '.'));
    pushNav(genus.name, () => showSpecies(genus, species));
  } catch(e) {
    showError('Error al cargar', e.message, () => enterGenus(genus));
  }
}

// ─── LEVEL: SPECIES ───────────────────────────────────────────
function showSpecies(genus, species) {
  const sorted = [...species].sort((a, b) => a.name.localeCompare(b.name));
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="level-header">
      <div>
        <div class="level-rank">Género</div>
        <div class="level-title">${genus.name}</div>
      </div>
      <div class="level-sub">${sorted.length} especies</div>
    </div>
    <div class="species-grid" id="grid"></div>
  `;
  const grid = document.getElementById('grid');
  sorted.forEach(sp => {
    const card = document.createElement('div');
    card.className = 'sp-card' + (isSeen(sp.id) ? ' seen-card' : '');
    card.dataset.spId = sp.id;
    const img = sp.photo
      ? `<img class="sp-img" src="${sp.photo}" alt="${sp.name}" loading="lazy"
           onerror="this.parentElement.innerHTML='<div class=\\'sp-no-img\\'><span>📷</span><small>sin foto</small></div>'">`
      : `<div class="sp-no-img"><span>📷</span><small>sin foto</small></div>`;
    card.innerHTML = `
      <div class="sp-img-wrap">
        ${img}
        <button class="seen-btn ${isSeen(sp.id) ? 'seen' : ''}" title="${isSeen(sp.id) ? 'Vista — clic para desmarcar' : 'Marcar como vista'}">
          ${isSeen(sp.id) ? '✓' : '○'}
        </button>
      </div>
      <div class="sp-info">
        <div class="sp-sci">${sp.name}</div>
        ${sp.common ? `<div class="sp-common">${sp.common}</div>` : ''}
        <div class="sp-obs">${formatCount(sp.observations)} obs.</div>
      </div>
    `;
    // Seen button — stop propagation so it doesn't open the modal
    card.querySelector('.seen-btn').addEventListener('click', async e => {
      e.stopPropagation();
      await toggleSeen(sp);
      const btn = card.querySelector('.seen-btn');
      const seen = isSeen(sp.id);
      btn.classList.toggle('seen', seen);
      btn.textContent = seen ? '✓' : '○';
      btn.title = seen ? 'Vista — clic para desmarcar' : 'Marcar como vista';
      card.classList.toggle('seen-card', seen);
    });
    card.addEventListener('click', () => openModal(sp));
    grid.appendChild(card);
  });
}

// ─── HELPERS ──────────────────────────────────────────────────
function makeCard(rank, name, common, pills, photo) {
  const card = document.createElement('div');
  card.className = 'taxon-card';
  const imgHtml = photo
    ? `<img class="tc-img" src="${photo}" alt="${name}" loading="lazy"
         onerror="this.parentElement.innerHTML='<div class=\\'tc-no-img\\'>🔬</div>'">`
    : `<div class="tc-no-img">🔬</div>`;
  card.innerHTML = `
    <div class="tc-img-wrap">${imgHtml}</div>
    <span class="tc-arrow">→</span>
    <div class="tc-body">
      <div class="tc-rank">${rank}</div>
      <div class="tc-name">${name}</div>
      ${common ? `<div class="tc-common">${common}</div>` : ''}
      <div class="tc-meta">${pills.map(p => `<span class="tc-pill">${p}</span>`).join('')}</div>
    </div>
  `;
  return card;
}

function formatCount(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'k';
  return n.toString();
}

async function loadGallery(sp) {
  // Fetch research-grade observations with photos
  const url = `${API}/observations?taxon_id=${sp.id}&quality_grade=research&photos=true&per_page=24&order_by=votes&locale=es`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const obs = data.results || [];

    // Collect unique photos (url + attribution)
    const seen = new Set();
    galleryPhotos = [];
    // Always include the taxon's default photo first
    if (sp.photo) {
      const large = sp.photo.replace('medium', 'large');
      seen.add(large);
      galleryPhotos.push({ url: large, thumb: sp.photo, attr: '' });
    }
    obs.forEach(o => {
      (o.photos || []).forEach(p => {
        const large = (p.url || '').replace('square', 'large').replace('medium', 'large');
        const thumb = (p.url || '').replace('square', 'small').replace('medium', 'small');
        if (large && !seen.has(large)) {
          seen.add(large);
          galleryPhotos.push({ url: large, thumb, attr: p.attribution || '' });
        }
      });
    });

    galleryIndex = 0;
    renderGallery();
  } catch(e) {
    // Fallback: just show the single default photo
    galleryPhotos = sp.photo ? [{ url: sp.photo.replace('medium','large'), thumb: sp.photo, attr: '' }] : [];
    galleryIndex = 0;
    renderGallery();
  }
}

function renderGallery() {
  const wrap = document.getElementById('galleryWrap');
  if (!wrap) return;

  if (!galleryPhotos.length) {
    wrap.innerHTML = `<div class="modal-no-photo">📷</div>`;
    return;
  }

  const p = galleryPhotos[galleryIndex];
  const total = galleryPhotos.length;

  wrap.innerHTML = `
    <img class="gallery-main" id="galleryMain" src="${p.url}" alt=""
      onerror="this.src='${galleryPhotos[galleryIndex]?.thumb || ''}'"
    >
    ${total > 1 ? `<div class="gallery-counter">${galleryIndex + 1} / ${total}</div>` : ''}
    ${galleryIndex > 0 ? `<button class="gallery-nav prev" id="galleryPrev">‹</button>` : ''}
    ${galleryIndex < total - 1 ? `<button class="gallery-nav next" id="galleryNext">›</button>` : ''}
    ${p.attr ? `<div class="gallery-caption">${p.attr}</div>` : ''}
    ${total > 1 ? `
      <div class="gallery-thumbs" id="galleryThumbs">
        ${galleryPhotos.map((ph, i) => `
          <img class="gallery-thumb ${i === galleryIndex ? 'active' : ''}"
            src="${ph.thumb}" data-i="${i}" alt=""
            onerror="this.style.display='none'"
          >
        `).join('')}
      </div>` : ''}
  `;

  // Listeners
  document.getElementById('galleryMain')?.addEventListener('click', () => openLightbox(p.url));
  document.getElementById('galleryPrev')?.addEventListener('click', () => { galleryIndex--; renderGallery(); });
  document.getElementById('galleryNext')?.addEventListener('click', () => { galleryIndex++; renderGallery(); });
  document.getElementById('galleryThumbs')?.querySelectorAll('.gallery-thumb').forEach(el => {
    el.addEventListener('click', () => { galleryIndex = +el.dataset.i; renderGallery(); });
  });

  // Keyboard nav
  wrap._keyHandler = e => {
    if (e.key === 'ArrowLeft'  && galleryIndex > 0)             { galleryIndex--; renderGallery(); }
    if (e.key === 'ArrowRight' && galleryIndex < galleryPhotos.length - 1) { galleryIndex++; renderGallery(); }
  };
  document.removeEventListener('keydown', wrap._keyHandler);
  document.addEventListener('keydown', wrap._keyHandler);

  // Scroll active thumb into view
  setTimeout(() => {
    const activeThumb = document.querySelector('.gallery-thumb.active');
    activeThumb?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

async function loadMap(sp) {
  try {
    // Fetch up to 200 research-grade observations with coordinates
    const url = `https://api.inaturalist.org/v1/observations?taxon_id=${sp.id}&quality_grade=research&geo=true&per_page=200&order_by=observed_on&locale=es`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('no data');
    const data = await res.json();
    const obs = (data.results || []).filter(o => o.geojson);

    if (!obs.length) {
      document.getElementById('mapLoading').innerHTML = '<span style="color:var(--dim)">Sin observaciones geolocalizadas</span>';
      return;
    }

    // Show map, hide loader
    document.getElementById('mapLoading').style.display = 'none';
    const mapEl = document.getElementById('speciesMap');
    mapEl.style.display = 'block';

    // Init Leaflet map
    const map = L.map('speciesMap', {
      zoom: 2, center: [20, 0],
      zoomControl: true, attributionControl: false,
    });
    currentMap = map;

    // Dark tile layer (CartoDB dark matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    // Labels on top
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, opacity: 0.6
    }).addTo(map);

    // Custom circle marker
    const markerStyle = {
      radius: 5, fillColor: '#7ee787', color: '#0d1117',
      weight: 1, opacity: 0.9, fillOpacity: 0.7
    };

    const bounds = [];
    obs.forEach(o => {
      const [lng, lat] = o.geojson.coordinates;
      bounds.push([lat, lng]);
      const marker = L.circleMarker([lat, lng], markerStyle).addTo(map);
      const date = o.observed_on ? o.observed_on.slice(0, 10) : 'fecha desconocida';
      const place = o.place_guess || '';
      marker.bindPopup(`
        <div style="font-style:italic;margin-bottom:2px">${sp.name}</div>
        <div style="color:var(--muted)">${place}</div>
        <div style="color:var(--dim);margin-top:2px">${date}</div>
      `);
    });

    // Fit map to observations
    if (bounds.length) map.fitBounds(bounds, { padding: [20, 20], maxZoom: 7 });

    document.getElementById('mapNote').textContent =
      `${obs.length} observaciones verificadas · iNaturalist`;

  } catch(e) {
    document.getElementById('mapLoading').innerHTML =
      '<span style="color:var(--dim)">No se pudo cargar el mapa</span>';
  }
}

// ─── SWIPE DOWN TO CLOSE (mobile) ─────────────────────────────
(function() {
  const sheet = document.getElementById('modalSheet');
  let startY = 0, isDragging = false;

  sheet.addEventListener('touchstart', e => {
    // Only drag from the handle area or top 60px
    if (e.target.classList.contains('modal-handle') || e.touches[0].clientY - sheet.getBoundingClientRect().top < 60) {
      startY = e.touches[0].clientY;
      isDragging = true;
      sheet.style.transition = 'none';
    }
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  }, { passive: true });

  sheet.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = '';
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 120) {
      closeModal();
    } else {
      sheet.style.transform = '';
    }
  });
})();

// ─── SEARCH ───────────────────────────────────────────────────
const RANK_ICONS = {
  kingdom: '🌍', phylum: '🔬', class: '📦', order: '📋',
  family: '🏠', genus: '🔤', species: '🌿', subspecies: '🔬',
};
const RANK_ES = {
  kingdom: 'Reino', phylum: 'Filo', class: 'Clase', order: 'Orden',
  family: 'Familia', genus: 'Género', species: 'Especie', subspecies: 'Subespecie',
};

let searchTimer = null;
let searchFocusIndex = -1;
let searchResults = [];

const searchInput   = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchClear   = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  if (q.length < 2) { closeDropdown(); return; }
  searchDropdown.innerHTML = `<div class="search-msg">Buscando…</div>`;
  searchDropdown.classList.add('open');
  searchTimer = setTimeout(() => doSearch(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchDropdown.querySelectorAll('.search-result');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchFocusIndex = Math.min(searchFocusIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchFocusIndex = Math.max(searchFocusIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIndex));
  } else if (e.key === 'Enter') {
    if (searchFocusIndex >= 0 && searchResults[searchFocusIndex]) {
      selectSearchResult(searchResults[searchFocusIndex]);
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
    searchInput.blur();
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  closeDropdown();
  searchInput.focus();
});

// Close when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) closeDropdown();
});

function closeDropdown() {
  searchDropdown.classList.remove('open');
  searchDropdown.innerHTML = '';
  searchFocusIndex = -1;
  searchResults = [];
}

async function doSearch(q) {
  try {
    const url = `https://api.inaturalist.org/v1/taxa/autocomplete?q=${encodeURIComponent(q)}&per_page=10&locale=es`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    searchResults = data.results || [];
    renderDropdown(searchResults, q);
  } catch(e) {
    searchDropdown.innerHTML = `<div class="search-msg">Error al buscar</div>`;
  }
}

function renderDropdown(results, q) {
  searchFocusIndex = -1;
  if (!results.length) {
    searchDropdown.innerHTML = `<div class="search-msg">Sin resultados para "${q}"</div>`;
    return;
  }
  searchDropdown.innerHTML = '';
  results.forEach((taxon, i) => {
    const photo = taxon.default_photo?.square_url;
    const rank  = taxon.rank || '';
    const icon  = RANK_ICONS[rank] || '🔬';
    const rankEs = RANK_ES[rank] || rank;

    const el = document.createElement('div');
    el.className = 'search-result';
    el.innerHTML = `
      ${photo
        ? `<img class="sr-photo" src="${photo}" alt="" onerror="this.outerHTML='<div class=\\'sr-no-photo\\'>${icon}</div>'">`
        : `<div class="sr-no-photo">${icon}</div>`}
      <div class="sr-info">
        <div class="sr-name">${taxon.name}</div>
        ${taxon.preferred_common_name ? `<div class="sr-common">${taxon.preferred_common_name}</div>` : ''}
      </div>
      <span class="sr-rank">${rankEs}</span>
    `;
    el.addEventListener('mousedown', e => e.preventDefault()); // prevent input blur
    el.addEventListener('click', () => selectSearchResult(taxon));
    searchDropdown.appendChild(el);
  });
}

async function selectSearchResult(taxon) {
  closeDropdown();
  searchInput.value = '';
  searchClear.classList.remove('visible');

  const rank = taxon.rank;

  // If species → open modal directly
  if (rank === 'species' || rank === 'subspecies') {
    const sp = {
      id: taxon.id,
      name: taxon.name,
      common: taxon.preferred_common_name || '',
      photo: taxon.default_photo?.medium_url || taxon.default_photo?.url || null,
      observations: taxon.observations_count || 0,
      inatUrl: `https://www.inaturalist.org/taxa/${taxon.id}`,
      wikipedia: taxon.wikipedia_url || null,
    };
    openModal(sp);
    return;
  }

  // Otherwise navigate into that taxon as a level
  const nextRank = { order: 'family', family: 'genus', genus: 'species', class: 'order', phylum: 'order', kingdom: 'class' }[rank] || 'species';
  const rankEs = RANK_ES[rank] || rank;
  const nextRankEs = RANK_ES[nextRank] || nextRank;

  showLoading(`Cargando ${nextRankEs}s de ${taxon.name}…`);
  try {
    const children = await cachedChildren(taxon.id, nextRank);
    if (!children.length) throw new Error(`No se encontraron ${nextRankEs}s.`);

    // Reset nav and push a single level
    navStack.length = 0;
    pushNav(taxon.name, () => {
      const sorted = [...children].sort((a, b) => a.name.localeCompare(b.name));
      const m = document.getElementById('main');
      m.innerHTML = `
        <div class="level-header">
          <div>
            <div class="level-rank">${rankEs}</div>
            <div class="level-title">${taxon.name}</div>
          </div>
          <div class="level-sub">${sorted.length} ${nextRankEs}s</div>
        </div>
        <div class="card-grid" id="grid"></div>
      `;
      sorted.forEach(child => {
        const childNextRank = { order: 'family', family: 'genus', genus: 'species' }[nextRank];
        const sppCount = child.complete_species_count;
        const pills = sppCount ? [`${sppCount.toLocaleString()} especies`] : [formatCount(child.observations_count) + ' obs.'];
        const card = makeCard(nextRankEs, child.name, child.preferred_common_name || '',
          pills, child.default_photo?.medium_url || child.default_photo?.url || null);
        card.addEventListener('click', () => {
          if (nextRank === 'genus') {
            enterGenus(child);
          } else if (nextRank === 'family') {
            enterFamily(child);
          } else if (nextRank === 'order') {
            enterOrder(child);
          } else if (nextRank === 'species') {
            // treat as species card
            const sp = {
              id: child.id, name: child.name,
              common: child.preferred_common_name || '',
              photo: child.default_photo?.medium_url || null,
              observations: child.observations_count || 0,
              inatUrl: `https://www.inaturalist.org/taxa/${child.id}`,
              wikipedia: child.wikipedia_url || null,
            };
            openModal(sp);
          }
        });
        document.getElementById('grid').appendChild(card);
      });
    });
  } catch(e) {
    showError('Error al cargar', e.message);
  }
}

  9: 'País', 10: 'Parque', 12: 'País', 13: 'Región', 14: 'Océano',
  24: 'Comarca', 29: 'País', 100: 'Comunidad', 101: 'Condado', 102: 'Ciudad',
};
const PLACE_TYPE_ICONS = {
  1: '🏳️', 2: '📍', 8: '🌍', 9: '🏳️', 10: '🌲', 29: '🏳️',
};

function ensureDropdownStructure() {
  if (!document.getElementById('placeResultsList')) {
    placeDropdown.innerHTML = `
      <div id="placeResultsList"></div>
      <div class="place-preview" id="placePreviewInner">
        <div id="placePreviewMap"></div>
        <div class="place-preview-label" id="placePreviewLabelInner"></div>
      </div>
    `;
  }
}

placeInput.addEventListener('input', () => {
  const q = placeInput.value.trim();
  placeClear.classList.toggle('visible', q.length > 0);
  clearTimeout(placeTimer);
  if (q.length < 2) { closePlaceDropdown(); return; }
  ensureDropdownStructure();
  document.getElementById('placeResultsList').innerHTML = `<div class="place-msg">Buscando…</div>`;
  placeDropdown.classList.add('open');
  placeTimer = setTimeout(() => searchPlaces(q), 350);
});

placeInput.addEventListener('keydown', e => {
  const items = placeDropdown.querySelectorAll('.place-result');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    placeFocusIndex = Math.min(placeFocusIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === placeFocusIndex));
    if (placeResults[placeFocusIndex]) showPreview(placeResults[placeFocusIndex]);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    placeFocusIndex = Math.max(placeFocusIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === placeFocusIndex));
    if (placeResults[placeFocusIndex]) showPreview(placeResults[placeFocusIndex]);
  } else if (e.key === 'Enter' && placeFocusIndex >= 0) {
    selectPlace(placeResults[placeFocusIndex]);
  } else if (e.key === 'Escape') {
    closePlaceDropdown(); placeInput.blur();
  }
});

placeClear.addEventListener('click', () => {
  placeInput.value = ''; placeClear.classList.remove('visible');
  closePlaceDropdown(); placeInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('placeWrap').contains(e.target)) closePlaceDropdown();
});

document.getElementById('activePlaceClear').addEventListener('click', clearPlaceFilter);

function closePlaceDropdown() {
  placeDropdown.classList.remove('open');
  placeDropdown.innerHTML = '';
  placeFocusIndex = -1; placeResults = [];
  if (previewMap) { previewMap.remove(); previewMap = null; }
}

async function searchPlaces(q) {
  try {
    const url = `${API}/places/autocomplete?q=${encodeURIComponent(q)}&per_page=8`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    placeResults = data.results || [];
    renderPlaceDropdown(placeResults);
  } catch(e) {
    ensureDropdownStructure();
    document.getElementById('placeResultsList').innerHTML = `<div class="place-msg">Error al buscar</div>`;
  }
}

function renderPlaceDropdown(results) {
  placeFocusIndex = -1;
  ensureDropdownStructure();
  const list = document.getElementById('placeResultsList');
  if (!results.length) {
    list.innerHTML = `<div class="place-msg">Sin resultados</div>`;
    return;
  }
  list.innerHTML = '';
  results.forEach((place, i) => {
    const icon = PLACE_TYPE_ICONS[place.place_type] || '📍';
    const type = PLACE_TYPE_LABELS[place.place_type] || 'Lugar';
    const el = document.createElement('div');
    el.className = 'place-result';
    el.innerHTML = `
      <span class="pr-icon">${icon}</span>
      <span class="pr-name">${place.display_name || place.name}</span>
      <span class="pr-type">${type}</span>
    `;
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('mouseenter', () => {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(() => showPreview(place), 180);
    });
    el.addEventListener('click', () => selectPlace(place));
    list.appendChild(el);
  });
  // Auto-preview first result
  if (results[0]) setTimeout(() => showPreview(results[0]), 350);
}

// Cache de geometrías para no repetir fetches
const geoCache = {};

function obtenerGeometria(placeId) {
  if (geoCache[placeId]) return geoCache[placeId];
  geoCache[placeId] = fetch(`${API}/places/${placeId}`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || !data.results || !data.results[0]) return null;
      return data.results[0].geometry_geojson || null;
    })
    .catch(() => null);
  return geoCache[placeId];
}

async function showPreview(place) {
  const previewEl = document.getElementById('placePreviewInner');
  const mapEl     = document.getElementById('placePreviewMap');
  const labelEl   = document.getElementById('placePreviewLabelInner');
  if (!previewEl || !mapEl) return;

  previewEl.classList.add('visible');
  if (labelEl) labelEl.textContent = place.display_name || place.name;

  // Init Leaflet map once, then invalidate size so tiles render correctly
  if (!previewMap) {
    previewMap = L.map('placePreviewMap', {
      zoomControl: false, attributionControl: false,
      dragging: false, scrollWheelZoom: false,
      doubleClickZoom: false, touchZoom: false,
      center: [20, 0], zoom: 2,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19
    }).addTo(previewMap);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, opacity: 0.7
    }).addTo(previewMap);
    // Force Leaflet to recalculate size after the element becomes visible
    setTimeout(() => previewMap.invalidateSize(), 50);
  } else {
    previewMap.invalidateSize();
  }

  // Remove previous GeoJSON/marker layers
  previewMap.eachLayer(l => {
    if (l instanceof L.GeoJSON || l instanceof L.CircleMarker) previewMap.removeLayer(l);
  });

  // Fetch the real polygon geometry
  const geojson = await obtenerGeometria(place.id);

  if (geojson) {
    try {
      const geo = typeof geojson === 'string' ? JSON.parse(geojson) : geojson;
      const layer = L.geoJSON(geo, {
        style: { color: '#58a6ff', weight: 2, fillColor: '#58a6ff', fillOpacity: 0.18 }
      }).addTo(previewMap);
      previewMap.fitBounds(layer.getBounds(), { padding: [16, 16] });
    } catch(e) {
      // geometry parse failed — fall through to coordinate fallback
      mostrarPuntoFallback(place);
    }
  } else {
    mostrarPuntoFallback(place);
  }
}

function mostrarPuntoFallback(place) {
  if (!previewMap || !place.location) return;
  const [lat, lng] = place.location.split(',').map(Number);
  if (isNaN(lat) || isNaN(lng)) return;
  previewMap.setView([lat, lng], 5);
  L.circleMarker([lat, lng], {
    radius: 8, color: '#58a6ff', fillColor: '#58a6ff', fillOpacity: 0.8, weight: 2
  }).addTo(previewMap);
}

function selectPlace(place) {
  activePlaceId = place.id;
  activePlaceName = place.display_name || place.name;
  clearCache();
  placeInput.value = '';
  placeClear.classList.remove('visible');
  closePlaceDropdown();

function clearPlaceFilter() {
  activePlaceId = null;
  activePlaceName = '';
  clearCache();
  activePlaceEl.classList.remove('visible');
  navStack.length = 0;
  history.replaceState({ depth: 0 }, '', '');
  repaint();
}

// ── Firestore helpers ─────────────────────────────────────────
function userDocRef() {
  return doc(db, 'users', currentUser.uid);
}

async function loadSeenFromFirestore() {
  try {
    const snap = await getDoc(userDocRef());
    seenCache = snap.exists() ? (snap.data().seen || {}) : {};
  } catch(e) {
    seenCache = {};
  }
  updateSeenCounter();
  // Refresh current view if showing species
  const grid = document.getElementById('grid');
  if (grid) {
    grid.querySelectorAll('.sp-card').forEach(card => {
      const id = parseInt(card.dataset.spId);
      if (!id) return;
      const seen = !!seenCache[id];
      card.classList.toggle('seen-card', seen);
      const btn = card.querySelector('.seen-btn');
      if (btn) { btn.classList.toggle('seen', seen); btn.textContent = seen ? '✓' : '○'; }
    });
  }
}

// ── Seen species API (now uses Firestore) ─────────────────────
function isSeen(id) {
  return !!seenCache[id];
}

async function toggleSeen(sp) {
  if (!currentUser) {
    showLoginPrompt();
    return;
  }
  const wasSeen = !!seenCache[sp.id];
  if (wasSeen) {
    delete seenCache[sp.id];
  } else {
    seenCache[sp.id] = {
      id: sp.id, name: sp.name, common: sp.common || '',
      photo: sp.photo || null, inatUrl: sp.inatUrl,
      seenAt: new Date().toISOString(),
    };
  }
  updateSeenCounter();
  // Write to Firestore
  try {
    if (wasSeen) {
      await updateDoc(userDocRef(), { [`seen.${sp.id}`]: deleteField() });
    } else {
      await setDoc(userDocRef(), { seen: { [sp.id]: seenCache[sp.id] } }, { merge: true });
    }
  } catch(e) {
    console.error('Firestore write error:', e);
  }
}

function updateSeenCounter() {
  const count = Object.keys(seenCache).length;
  const el = document.getElementById('mySpeciesCount');
  if (el) el.textContent = count;
}

// ─── INAT IMPORT ──────────────────────────────────────────────
async function importFromInat(username) {
  const btn    = document.getElementById('inatImportBtn');
  const status = document.getElementById('inatImportStatus');
  if (!btn || !status) return;

  btn.disabled = true;
  btn.textContent = '…';
  status.style.display = 'block';
  status.textContent = 'Buscando usuario…';

  try {
    // Verify user exists
    const userRes = await fetch(`${API}/users/autocomplete?q=${encodeURIComponent(username)}&per_page=5`);
    const userData = await userRes.json();
    const user = (userData.results || []).find(u => u.login.toLowerCase() === username.toLowerCase());
    if (!user) throw new Error(`Usuario "${username}" no encontrado en iNaturalist`);

    status.textContent = `✓ Usuario encontrado: ${user.name || user.login}. Cargando observaciones…`;

    // Fetch all research-grade species observations (paginated)
    let page = 1;
    let imported = 0;
    let total = null;
    const newEntries = {};

    while (true) {
      const url = `${API}/observations/species_counts?user_login=${encodeURIComponent(user.login)}&quality_grade=research&per_page=100&page=${page}&locale=es`;
      const res = await fetch(url);
      if (!res.ok) break;
      const data = await res.json();

      if (total === null) total = data.total_results;
      const results = data.results || [];
      if (!results.length) break;

      for (const r of results) {
        const t = r.taxon;
        if (!seenCache[t.id]) {
          newEntries[t.id] = {
            id: t.id, name: t.name,
            common: t.preferred_common_name || '',
            photo: t.default_photo?.medium_url || t.default_photo?.url || null,
            inatUrl: `https://www.inaturalist.org/taxa/${t.id}`,
            seenAt: new Date().toISOString(),
            source: 'inat_import',
          };
          imported++;
        }
      }

      status.textContent = `Importando… ${Object.keys(seenCache).length + imported} especies (página ${page})`;

      if (results.length < 100) break;
      page++;
      await new Promise(res => setTimeout(res, 150)); // avoid rate limiting
    }

    if (imported === 0) {
      status.textContent = '✓ Todo ya estaba importado, nada nuevo que añadir.';
    } else {
      // Merge into seenCache and save to Firestore
      Object.assign(seenCache, newEntries);
      await setDoc(userDocRef(), { seen: seenCache }, { merge: true });
      updateSeenCounter();
      status.textContent = `✓ ¡Importadas ${imported} especies nuevas de @${user.login}!`;
      // Re-render after a moment
      setTimeout(() => renderMySpecies(), 1500);
    }

  } catch(e) {
    status.textContent = `✗ Error: ${e.message}`;
    console.error('iNat import error:', e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Importar';
  }
}
